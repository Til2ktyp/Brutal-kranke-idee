<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Local Storage Viewer</title>
    <style>
        :root {
            --bg-1: #0f172a;
            --bg-2: #24315f;
            --bg-3: #3b3f8f;
            --panel: rgba(255, 255, 255, 0.11);
            --panel-strong: rgba(255, 255, 255, 0.18);
            --border: rgba(255, 255, 255, 0.18);
            --text: #ffffff;
            --muted: rgba(255, 255, 255, 0.72);
            --accent: #fbc531;
            --accent-2: #38bdf8;
            --danger: #ef4444;
            --good: #26de81;
            --dark: #111827;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            touch-action: manipulation;
            -webkit-text-size-adjust: 100%;
        }

        body {
            min-height: 100vh;
            margin: 0;
            padding: 26px 18px 46px;
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 12% 18%, rgba(56, 189, 248, 0.30), transparent 28%),
                radial-gradient(circle at 86% 12%, rgba(251, 197, 49, 0.22), transparent 24%),
                radial-gradient(circle at 50% 100%, rgba(168, 85, 247, 0.24), transparent 34%),
                linear-gradient(135deg, var(--bg-1), var(--bg-2) 52%, var(--bg-3));
            overflow-x: hidden;
        }

        button,
        a,
        input,
        [role="button"] {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .shell {
            width: min(1120px, 100%);
            margin: 0 auto;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            margin-bottom: 22px;
        }

        .back-link {
            color: var(--dark);
            background: var(--accent);
            padding: 11px 15px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 950;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.24);
        }

        h1 {
            margin: 0;
            color: var(--accent);
            font-size: clamp(2.2rem, 6vw, 4.8rem);
            line-height: 0.95;
            font-weight: 950;
            letter-spacing: 0;
        }

        .subtitle {
            max-width: 780px;
            margin: 12px 0 24px;
            color: var(--muted);
            font-size: 1rem;
            line-height: 1.55;
        }

        .toolbar {
            display: grid;
            grid-template-columns: minmax(180px, 1fr) repeat(3, auto);
            gap: 10px;
            align-items: center;
            margin-bottom: 14px;
        }

        input {
            width: 100%;
            min-height: 48px;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 0 14px;
            background: rgba(255, 255, 255, 0.10);
            color: var(--text);
            font: inherit;
            outline: none;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.52);
        }

        button {
            min-height: 48px;
            border: 0;
            border-radius: 14px;
            padding: 0 14px;
            color: var(--dark);
            background: linear-gradient(135deg, var(--accent), #f59e0b);
            font: inherit;
            font-weight: 950;
            cursor: pointer;
            box-shadow: 0 10px 24px rgba(251, 197, 49, 0.18);
        }

        button.secondary {
            color: var(--text);
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid var(--border);
            box-shadow: none;
        }

        button.danger {
            color: white;
            background: linear-gradient(135deg, var(--danger), #dc2626);
            box-shadow: 0 10px 24px rgba(220, 38, 38, 0.18);
        }

        .summary {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
            margin-bottom: 16px;
        }

        .summary-card,
        .storage-card,
        .empty {
            border: 1px solid var(--border);
            border-radius: 18px;
            background: linear-gradient(145deg, var(--panel-strong), var(--panel));
            box-shadow: 0 22px 60px rgba(0, 0, 0, 0.24);
            backdrop-filter: blur(18px);
        }

        .summary-card {
            padding: 14px;
        }

        .summary-card strong {
            display: block;
            color: var(--muted);
            font-size: 0.78rem;
            text-transform: uppercase;
        }

        .summary-card span {
            display: block;
            margin-top: 6px;
            color: var(--text);
            font-size: 1.45rem;
            font-weight: 950;
            font-variant-numeric: tabular-nums;
        }

        .list {
            display: grid;
            gap: 12px;
        }

        .storage-card {
            overflow: hidden;
        }

        .storage-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
        }

        .key-name {
            min-width: 0;
            color: #fde68a;
            font-weight: 950;
            overflow-wrap: anywhere;
        }

        .key-meta {
            color: var(--muted);
            font-size: 0.82rem;
            white-space: nowrap;
        }

        .card-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 12px 14px 0;
        }

        .card-actions button {
            min-height: 38px;
            padding: 0 11px;
            font-size: 0.85rem;
        }

        pre {
            max-height: 360px;
            margin: 0;
            padding: 14px;
            color: rgba(255, 255, 255, 0.88);
            background: rgba(3, 7, 18, 0.42);
            overflow: auto;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
            font: 0.9rem/1.5 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        }

        .value-editor {
            display: none;
            width: calc(100% - 28px);
            min-height: 170px;
            margin: 14px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 14px;
            padding: 12px;
            color: rgba(255, 255, 255, 0.92);
            background: rgba(3, 7, 18, 0.42);
            outline: none;
            resize: vertical;
            font: 0.9rem/1.5 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        }

        .storage-card.editing pre {
            display: none;
        }

        .storage-card.editing .value-editor {
            display: block;
        }

        .create-panel {
            display: grid;
            grid-template-columns: minmax(160px, 0.7fr) minmax(180px, 1fr) auto;
            gap: 10px;
            margin-bottom: 16px;
        }

        .empty {
            padding: 28px;
            color: var(--muted);
            text-align: center;
            font-weight: 850;
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: 22px;
            z-index: 20;
            transform: translateX(-50%);
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 999px;
            background: rgba(15, 23, 42, 0.92);
            color: #fde68a;
            font-weight: 950;
            box-shadow: 0 18px 44px rgba(0, 0, 0, 0.34);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.18s ease, transform 0.18s ease;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(-4px);
        }

        @media (max-width: 760px) {
            .topbar,
            .storage-head {
                align-items: stretch;
                flex-direction: column;
            }

            .toolbar,
            .create-panel,
            .summary {
                grid-template-columns: 1fr;
            }

            .toolbar button,
            .create-panel button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <main class="shell">
        <div class="topbar">
            <a class="back-link" href="index.html">Zurück</a>
        </div>

        <h1>Local Storage</h1>
        <p class="subtitle">Zeigt alle Einträge, die diese Seite in deinem Browser unter derselben Origin sehen kann. Sensible Sachen gehören hier grundsätzlich nicht rein.</p>

        <div class="toolbar">
            <input id="searchInput" type="search" placeholder="Keys oder Werte suchen..." autocomplete="off">
            <button class="secondary" type="button" id="reloadBtn">Neu laden</button>
            <button class="secondary" type="button" id="exportBtn">Export</button>
            <button class="danger" type="button" id="clearBtn">Alles löschen</button>
        </div>

        <div class="create-panel">
            <input id="newKeyInput" type="text" placeholder="Neuer Key..." autocomplete="off">
            <input id="newValueInput" type="text" placeholder="Neuer Wert..." autocomplete="off">
            <button type="button" id="createBtn">Anlegen</button>
        </div>

        <section class="summary" aria-label="Local Storage Zusammenfassung">
            <div class="summary-card"><strong>Einträge</strong><span id="entryCount">0</span></div>
            <div class="summary-card"><strong>Gefiltert</strong><span id="filteredCount">0</span></div>
            <div class="summary-card"><strong>Größe</strong><span id="storageSize">0 B</span></div>
        </section>

        <section class="list" id="storageList" aria-live="polite"></section>
    </main>

    <div class="toast" id="toast"></div>

    <script>
        const listEl = document.getElementById('storageList');
        const searchInput = document.getElementById('searchInput');
        const entryCountEl = document.getElementById('entryCount');
        const filteredCountEl = document.getElementById('filteredCount');
        const storageSizeEl = document.getElementById('storageSize');
        const toastEl = document.getElementById('toast');

        let entries = [];

        function showToast(text) {
            toastEl.textContent = text;
            toastEl.classList.add('show');
            window.clearTimeout(showToast.timer);
            showToast.timer = window.setTimeout(() => toastEl.classList.remove('show'), 1400);
        }

        function formatBytes(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1024 / 1024).toFixed(2) + ' MB';
        }

        function prettyValue(value) {
            try {
                return JSON.stringify(JSON.parse(value), null, 2);
            } catch (error) {
                return value;
            }
        }

        function readStorage() {
            entries = [];

            for (let index = 0; index < localStorage.length; index++) {
                const key = localStorage.key(index);
                const value = localStorage.getItem(key) ?? '';

                entries.push({
                    key,
                    value,
                    display: prettyValue(value),
                    bytes: new Blob([key + value]).size
                });
            }

            entries.sort((a, b) => a.key.localeCompare(b.key, 'de'));
            render();
        }

        function render() {
            const query = searchInput.value.trim().toLowerCase();
            const filtered = entries.filter(entry => {
                if (!query) return true;
                return entry.key.toLowerCase().includes(query) || entry.value.toLowerCase().includes(query);
            });

            const totalBytes = entries.reduce((sum, entry) => sum + entry.bytes, 0);
            entryCountEl.textContent = String(entries.length);
            filteredCountEl.textContent = String(filtered.length);
            storageSizeEl.textContent = formatBytes(totalBytes);

            listEl.innerHTML = '';

            if (!filtered.length) {
                const empty = document.createElement('div');
                empty.className = 'empty';
                empty.textContent = entries.length ? 'Keine Treffer.' : 'localStorage ist leer.';
                listEl.append(empty);
                return;
            }

            const fragment = document.createDocumentFragment();

            filtered.forEach(entry => {
                const card = document.createElement('article');
                card.className = 'storage-card';

                const head = document.createElement('div');
                head.className = 'storage-head';

                const key = document.createElement('div');
                key.className = 'key-name';
                key.textContent = entry.key;

                const meta = document.createElement('div');
                meta.className = 'key-meta';
                meta.textContent = formatBytes(entry.bytes);

                const actions = document.createElement('div');
                actions.className = 'card-actions';

                const copyKey = document.createElement('button');
                copyKey.className = 'secondary';
                copyKey.type = 'button';
                copyKey.textContent = 'Key kopieren';
                copyKey.addEventListener('click', () => copyText(entry.key, 'Key kopiert'));

                const copyValue = document.createElement('button');
                copyValue.className = 'secondary';
                copyValue.type = 'button';
                copyValue.textContent = 'Wert kopieren';
                copyValue.addEventListener('click', () => copyText(entry.value, 'Wert kopiert'));

                const edit = document.createElement('button');
                edit.className = 'secondary';
                edit.type = 'button';
                edit.textContent = 'Bearbeiten';

                const save = document.createElement('button');
                save.type = 'button';
                save.textContent = 'Speichern';
                save.style.display = 'none';

                const cancel = document.createElement('button');
                cancel.className = 'secondary';
                cancel.type = 'button';
                cancel.textContent = 'Abbrechen';
                cancel.style.display = 'none';

                const remove = document.createElement('button');
                remove.className = 'danger';
                remove.type = 'button';
                remove.textContent = 'Löschen';
                remove.addEventListener('click', () => {
                    if (!confirm('Key wirklich löschen?\\n\\n' + entry.key)) return;
                    localStorage.removeItem(entry.key);
                    readStorage();
                    showToast('Gelöscht');
                });

                const pre = document.createElement('pre');
                pre.textContent = entry.display;

                const editor = document.createElement('textarea');
                editor.className = 'value-editor';
                editor.value = entry.display;
                editor.spellcheck = false;

                edit.addEventListener('click', () => {
                    card.classList.add('editing');
                    edit.style.display = 'none';
                    save.style.display = '';
                    cancel.style.display = '';
                    editor.focus();
                });

                cancel.addEventListener('click', () => {
                    editor.value = entry.display;
                    card.classList.remove('editing');
                    edit.style.display = '';
                    save.style.display = 'none';
                    cancel.style.display = 'none';
                });

                save.addEventListener('click', () => {
                    localStorage.setItem(entry.key, editor.value);
                    readStorage();
                    showToast('Gespeichert');
                });

                head.append(key, meta);
                actions.append(copyKey, copyValue, edit, save, cancel, remove);
                card.append(head, actions, pre, editor);
                fragment.append(card);
            });

            listEl.append(fragment);
        }

        async function copyText(text, message) {
            try {
                await navigator.clipboard.writeText(text);
                showToast(message);
            } catch (error) {
                showToast('Kopieren vom Browser blockiert');
            }
        }

        function exportStorage() {
            const data = Object.fromEntries(entries.map(entry => [entry.key, entry.value]));
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'localstorage-export.json';
            document.body.append(link);
            link.click();
            link.remove();
            URL.revokeObjectURL(url);
            showToast('Export erstellt');
        }

        document.getElementById('reloadBtn').addEventListener('click', () => {
            readStorage();
            showToast('Neu geladen');
        });

        document.getElementById('exportBtn').addEventListener('click', exportStorage);

        document.getElementById('createBtn').addEventListener('click', () => {
            const keyInput = document.getElementById('newKeyInput');
            const valueInput = document.getElementById('newValueInput');
            const key = keyInput.value.trim();

            if (!key) {
                showToast('Key fehlt');
                keyInput.focus();
                return;
            }

            if (localStorage.getItem(key) !== null && !confirm('Key existiert schon. Überschreiben?\\n\\n' + key)) {
                return;
            }

            localStorage.setItem(key, valueInput.value);
            keyInput.value = '';
            valueInput.value = '';
            readStorage();
            showToast('Angelegt');
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            if (!entries.length) {
                showToast('Schon leer');
                return;
            }

            if (!confirm('Wirklich den kompletten localStorage dieser Origin löschen?')) return;
            localStorage.clear();
            readStorage();
            showToast('Alles gelöscht');
        });

        searchInput.addEventListener('input', render);

        document.addEventListener('contextmenu', event => {
            if (event.target.closest('button, a, [role="button"]')) {
                event.preventDefault();
            }
        });

        readStorage();
    </script>
</body>
</html>
