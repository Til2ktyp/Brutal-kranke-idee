<!DOCTYPE html>
<html lang="de">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"><title>Kurve</title><script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5795114678692881" crossorigin="anonymous"></script>
<style>
:root{--bg-1:#0f172a;--bg-2:#312e81;--bg-3:#7c3aed;--border:rgba(255,255,255,.18);--text:#fff;--muted:rgba(255,255,255,.72);--accent:#fbc531;--accent-2:#38bdf8;--good:#26de81;--danger:#ef4444;--dark:#1e272e}*{box-sizing:border-box}button,a,[role="button"]{-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation}body{min-height:100vh;margin:0;padding:92px 18px 48px;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;color:var(--text);background:radial-gradient(circle at 12% 18%,rgba(56,189,248,.34),transparent 28%),radial-gradient(circle at 88% 14%,rgba(251,197,49,.25),transparent 24%),radial-gradient(circle at 50% 100%,rgba(168,85,247,.33),transparent 33%),linear-gradient(135deg,var(--bg-1),var(--bg-2) 52%,var(--bg-3));overflow-x:hidden}body:before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.13;background-image:linear-gradient(rgba(255,255,255,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.08) 1px,transparent 1px);background-size:46px 46px;mask-image:radial-gradient(circle at center,#000,transparent 78%)}.back-home-btn{position:fixed;top:20px;left:20px;z-index:2;background:var(--accent);color:var(--dark);padding:12px 18px;border-radius:12px;font-weight:900;text-decoration:none;box-shadow:0 8px 20px rgba(0,0,0,.25)}
.shell{position:relative;z-index:1;width:min(1000px,100%);margin:0 auto}.hero{text-align:center;margin-bottom:20px}.eyebrow{display:inline-flex;margin-bottom:10px;padding:7px 12px;border-radius:999px;background:rgba(251,197,49,.16);color:#fde68a;border:1px solid rgba(251,197,49,.22);font-size:.8rem;font-weight:950;text-transform:uppercase}h1{margin:0;color:var(--accent);font-size:clamp(2.4rem,8vw,5rem);line-height:.95;font-weight:950}.subtitle{max-width:720px;margin:12px auto 0;color:var(--muted);line-height:1.55}.box{padding:22px;border:1px solid var(--border);border-radius:22px;background:linear-gradient(145deg,rgba(255,255,255,.16),rgba(255,255,255,.07));box-shadow:0 24px 70px rgba(0,0,0,.28);backdrop-filter:blur(18px)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}.stat{padding:13px;border-radius:14px;border:1px solid var(--border);background:rgba(255,255,255,.08);transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease}.stat strong{display:block;color:var(--muted);font-size:.74rem;text-transform:uppercase}.stat span{display:block;margin-top:5px;font-size:1.45rem;font-weight:950}.stat.bump{transform:translateY(-2px) scale(1.03);border-color:rgba(251,197,49,.46);box-shadow:0 16px 34px rgba(251,197,49,.16)}.chart{position:relative;height:320px;border-radius:20px;border:1px solid var(--border);background:radial-gradient(circle at 18% 0%,rgba(56,189,248,.14),transparent 36%),rgba(5,10,20,.48);overflow:hidden}.chart:before{content:"";position:absolute;inset:0;pointer-events:none;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);transform:translateX(-100%);animation:scan 3.4s linear infinite}.chart.flash-up{animation:flashUp .32s ease}.chart.flash-down{animation:flashDown .32s ease}.chart.flash-buy{animation:flashBuy .45s ease}.chart.flash-sell{animation:flashSell .45s ease}.trade-ring{position:absolute;z-index:2;width:54px;height:54px;border:2px solid rgba(251,197,49,.9);border-radius:999px;pointer-events:none;animation:tradeRing .62s ease-out forwards}canvas{position:relative;z-index:1;width:100%;height:100%}.actions{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px}button{min-height:52px;border:0;border-radius:14px;padding:12px;background:linear-gradient(135deg,var(--accent-2),#2563eb);color:#07111f;cursor:pointer;font:inherit;font-weight:950;box-shadow:0 10px 24px rgba(37,99,235,.26);transition:transform .16s ease,filter .16s ease,box-shadow .16s ease}button:hover{transform:translateY(-2px);filter:brightness(1.06)}button.action-pop{animation:buttonPop .34s ease}button.sell{background:linear-gradient(135deg,var(--good),#20bf6b)}button.hold{background:linear-gradient(135deg,var(--accent),#f59e0b)}button.secondary{background:rgba(255,255,255,.12);color:var(--text);border:1px solid var(--border);box-shadow:none}.log{min-height:34px;margin-top:12px;text-align:center;color:var(--muted);font-weight:850;transition:color .18s ease,transform .18s ease}.log.pop{color:#fde68a;transform:scale(1.03)}@keyframes scan{to{transform:translateX(100%)}}@keyframes flashUp{50%{box-shadow:0 0 38px rgba(38,222,129,.34);border-color:rgba(38,222,129,.42)}}@keyframes flashDown{50%{box-shadow:0 0 38px rgba(239,68,68,.3);border-color:rgba(239,68,68,.42)}}@keyframes flashBuy{45%{box-shadow:0 0 54px rgba(251,197,49,.42);border-color:rgba(251,197,49,.58);filter:saturate(1.45)}}@keyframes flashSell{45%{box-shadow:0 0 54px rgba(38,222,129,.42);border-color:rgba(38,222,129,.58);filter:saturate(1.45)}}@keyframes tradeRing{to{transform:scale(3.1);opacity:0}}@keyframes buttonPop{45%{transform:translateY(-3px) scale(1.06);box-shadow:0 18px 42px rgba(251,197,49,.25)}}@media(max-width:760px){body{padding-top:86px}.stats,.actions{grid-template-columns:repeat(2,1fr)}}
</style><style>.dopamine-burst{position:fixed;z-index:9999;left:0;top:0;width:14px;height:14px;border:2px solid rgba(251,197,49,.95);border-radius:999px;pointer-events:none;transform:translate(-50%,-50%);animation:dopamineRing .55s ease-out forwards}.dopamine-spark{position:fixed;z-index:9999;left:0;top:0;width:7px;height:7px;border-radius:999px;background:#fbc531;pointer-events:none;transform:translate(-50%,-50%);animation:dopamineSpark .58s ease-out forwards}.dopamine-hit{animation:dopamineHit .22s ease}@keyframes dopamineRing{to{width:110px;height:110px;opacity:0}}@keyframes dopamineSpark{to{transform:translate(calc(-50% + var(--x)),calc(-50% + var(--y))) scale(.2);opacity:0}}@keyframes dopamineHit{50%{filter:brightness(1.35) saturate(1.4);transform:scale(1.035)}}</style><style id="bb-touch-zoom-guard-style">
    html,
    body {
        touch-action: manipulation;
        -ms-touch-action: manipulation;
        -webkit-text-size-adjust: 100%;
    }
</style>
</head>
<body><a class="back-home-btn" href="https://blopperbold.org">← BlopperBold</a><main class="shell"><section class="hero"><div class="eyebrow">Risiko-Klicker</div><h1>Kurve</h1><p class="subtitle">Kaufen, halten, verkaufen. Die Linie lockt, der Rücksetzer lauert. Kurze Runden, schnelle Entscheidungen.</p></section><section class="box"><div class="stats"><div class="stat"><strong>Cash</strong><span id="cash">1000</span></div><div class="stat"><strong>Position</strong><span id="pos">0</span></div><div class="stat"><strong>Preis</strong><span id="price">50</span></div><div class="stat"><strong>Best</strong><span id="best">1000</span></div></div><div class="chart" id="chart"><canvas id="canvas"></canvas></div><div class="actions"><button id="buy">Kaufen</button><button class="sell" id="sell">Verkaufen</button><button class="hold" id="hold">Weiter</button><button class="secondary" id="reset">Reset</button></div><div class="log" id="log">Ziel: Wert am Ende maximieren. 80 Ticks.</div></section></main>
<script>
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d'),chart=document.getElementById('chart'),cashEl=document.getElementById('cash'),posEl=document.getElementById('pos'),priceEl=document.getElementById('price'),bestEl=document.getElementById('best'),logEl=document.getElementById('log'),buyBtn=document.getElementById('buy'),sellBtn=document.getElementById('sell');let cash=1000,pos=0,price=50,tick=0,prices=[],trend=0,best=Number(localStorage.getItem('kurveBest')||1000),segmentProgress=1,particles=[],lastPrice=50;bestEl.textContent=best;
function size(){canvas.width=canvas.clientWidth*devicePixelRatio;canvas.height=canvas.clientHeight*devicePixelRatio;ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);segmentProgress=1;draw()}window.addEventListener('resize',size);
function saveState(){localStorage.setItem('kurveState',JSON.stringify({cash,pos,price,tick,prices,trend,best,log:logEl.textContent}))}
function render(){cashEl.textContent=Math.round(cash);posEl.textContent=pos;priceEl.textContent=price.toFixed(1);bestEl.textContent=Math.round(best)}
function update(){render();saveState()}
function loadState(){const raw=localStorage.getItem('kurveState');if(!raw){reset();return}try{const state=JSON.parse(raw);cash=state.cash||1000;pos=state.pos||0;price=state.price||50;tick=state.tick||0;prices=Array.isArray(state.prices)&&state.prices.length?state.prices:[price];trend=state.trend||0;best=state.best||best;logEl.textContent=state.log||logEl.textContent;lastPrice=price;render();segmentProgress=1;draw()}catch(error){reset()}}
function pointFor(index,p,min,max,w,h){return{x:index/79*w,y:h-((p-min)/(max-min))*h}}
function makePath(limit,min,max,w,h){ctx.beginPath();prices.slice(0,limit).forEach((p,i)=>{const pt=pointFor(i,p,min,max,w,h);if(i===0)ctx.moveTo(pt.x,pt.y);else ctx.lineTo(pt.x,pt.y)});if(prices.length>1&&limit===prices.length-1){const from=pointFor(prices.length-2,prices[prices.length-2],min,max,w,h),to=pointFor(prices.length-1,prices[prices.length-1],min,max,w,h);ctx.lineTo(from.x+(to.x-from.x)*segmentProgress,from.y+(to.y-from.y)*segmentProgress)}}
function draw(){const w=canvas.clientWidth,h=canvas.clientHeight;ctx.clearRect(0,0,w,h);const pulse=Math.sin(Date.now()/280)*.5+.5;ctx.strokeStyle='rgba(255,255,255,.1)';ctx.lineWidth=1;for(let i=1;i<5;i++){ctx.beginPath();ctx.moveTo(0,h*i/5);ctx.lineTo(w,h*i/5);ctx.stroke()}ctx.fillStyle='rgba(56,189,248,.05)';ctx.fillRect(0,0,w*(tick/80),h);if(prices.length>=2){const min=Math.min(...prices)-4,max=Math.max(...prices)+4,limit=prices.length-1,gradient=ctx.createLinearGradient(0,0,w,0);gradient.addColorStop(0,'#38bdf8');gradient.addColorStop(.55,'#fbc531');gradient.addColorStop(1,'#26de81');ctx.lineWidth=10;ctx.strokeStyle='rgba(56,189,248,.12)';makePath(limit,min,max,w,h);ctx.stroke();ctx.lineWidth=4;ctx.strokeStyle=gradient;ctx.shadowColor='rgba(56,189,248,.65)';ctx.shadowBlur=18;makePath(limit,min,max,w,h);ctx.stroke();ctx.shadowBlur=0;const from=pointFor(prices.length-2,prices[prices.length-2],min,max,w,h),to=pointFor(prices.length-1,prices[prices.length-1],min,max,w,h),last={x:from.x+(to.x-from.x)*segmentProgress,y:from.y+(to.y-from.y)*segmentProgress};ctx.fillStyle=`rgba(251,197,49,${.72+pulse*.28})`;ctx.beginPath();ctx.arc(last.x,last.y,7+pulse*3,0,Math.PI*2);ctx.fill()}particles=particles.filter(p=>p.life>0);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=.025;ctx.fillStyle=`rgba(${p.color},${p.life})`;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill()})}
function animateSegment(){segmentProgress=0;const start=performance.now();function frame(now){segmentProgress=Math.min(1,(now-start)/280);draw();if(segmentProgress<1||particles.length)requestAnimationFrame(frame)}requestAnimationFrame(frame)}
function popStat(el){el.parentElement.classList.add('bump');setTimeout(()=>el.parentElement.classList.remove('bump'),220)}
function popLog(){logEl.classList.add('pop');setTimeout(()=>logEl.classList.remove('pop'),220)}
function burst(kind,hyper=false){const w=canvas.clientWidth,h=canvas.clientHeight,min=Math.min(...prices)-4,max=Math.max(...prices)+4,last=pointFor(Math.max(0,prices.length-1),price,min,max,w,h),color=kind==='down'?'239,68,68':kind==='sell'?'38,222,129':kind==='buy'?'251,197,49':'56,189,248',amount=hyper?52:18,power=hyper?8:5;for(let i=0;i<amount;i++)particles.push({x:last.x,y:last.y,vx:(Math.random()-.5)*power,vy:(Math.random()-.5)*power,size:(hyper?2.4:2)+Math.random()*(hyper?4:3),life:hyper?1:.8,color});if(hyper){const ring=document.createElement('span');ring.className='trade-ring';ring.style.left=last.x-27+'px';ring.style.top=last.y-27+'px';ring.style.borderColor=kind==='sell'?'rgba(38,222,129,.95)':'rgba(251,197,49,.95)';chart.append(ring);setTimeout(()=>ring.remove(),680)}chart.classList.add(kind==='down'?'flash-down':kind==='buy'?'flash-buy':kind==='sell'?'flash-sell':'flash-up');setTimeout(()=>chart.classList.remove('flash-down','flash-up','flash-buy','flash-sell'),450);popLog();draw();if(particles.length)requestAnimationFrame(function frame(){draw();if(particles.length)requestAnimationFrame(frame)})}
function step(){if(tick>=80){finish();return}lastPrice=price;trend+=Math.random()*.8-.38;trend*=.88;price=Math.max(4,price+trend+(Math.random()*4-1.8));prices.push(price);tick++;let effect=price>=lastPrice?'up':'down';if(Math.random()<.07){price*=Math.random()<.5?.78:1.24;prices[prices.length-1]=price;effect=price>=lastPrice?'up':'down';logEl.textContent=effect==='up'?'Spike.':'Dip.';burst(effect)}else logEl.textContent='Tick '+tick+'/80';update();popStat(priceEl);animateSegment()}
function buy(){if(tick>=80)return;const amount=Math.floor(cash/price);if(amount<=0){logEl.textContent='Kein Cash.';popLog();return}pos+=amount;cash-=amount*price;buyBtn.classList.add('action-pop');setTimeout(()=>buyBtn.classList.remove('action-pop'),360);burst('buy',true);step()}
function sell(){if(pos<=0){logEl.textContent='Keine Position.';popLog();step();return}cash+=pos*price;pos=0;sellBtn.classList.add('action-pop');setTimeout(()=>sellBtn.classList.remove('action-pop'),360);burst('sell',true);step()}
function finish(){const total=cash+pos*price;if(total>best){best=total;localStorage.setItem('kurveBest',String(best));logEl.textContent='Neuer Bestwert: '+Math.round(best);burst('sell')}else logEl.textContent='Endwert: '+Math.round(total);pos=0;cash=total;update()}
function reset(){cash=1000;pos=0;price=50;tick=0;prices=[price];trend=0;particles=[];segmentProgress=1;lastPrice=price;logEl.textContent='Neue Kurve.';update();draw()}
document.getElementById('buy').addEventListener('click',buy);document.getElementById('sell').addEventListener('click',sell);document.getElementById('hold').addEventListener('click',step);document.getElementById('reset').addEventListener('click',()=>{localStorage.removeItem('kurveState');reset()});document.addEventListener('contextmenu',event=>{if(event.target.closest('button, a, [role="button"]'))event.preventDefault()});size();loadState();
document.addEventListener('click',event=>{const target=event.target.closest('button,a,[role="button"]');if(!target)return;target.classList.remove('dopamine-hit');void target.offsetWidth;target.classList.add('dopamine-hit');const ring=document.createElement('span');ring.className='dopamine-burst';ring.style.left=event.clientX+'px';ring.style.top=event.clientY+'px';document.body.append(ring);setTimeout(()=>ring.remove(),620);for(let i=0;i<12;i++){const spark=document.createElement('span');spark.className='dopamine-spark';spark.style.left=event.clientX+'px';spark.style.top=event.clientY+'px';spark.style.background=i%3===0?'#38bdf8':i%3===1?'#fbc531':'#26de81';const angle=Math.random()*Math.PI*2,dist=32+Math.random()*42;spark.style.setProperty('--x',Math.cos(angle)*dist+'px');spark.style.setProperty('--y',Math.sin(angle)*dist+'px');document.body.append(spark);setTimeout(()=>spark.remove(),650)}});
</script><script id="bb-touch-zoom-guard">
(function() {
    if (window.__bbTouchZoomGuard) return;
    window.__bbTouchZoomGuard = true;

    let lastTouchEnd = 0;

    document.addEventListener('touchend', function(event) {
        const now = Date.now();

        if (now - lastTouchEnd <= 350 && event.cancelable) {
            event.preventDefault();
        }

        lastTouchEnd = now;
    }, { passive: false });

    document.addEventListener('dblclick', function(event) {
        if (event.cancelable) {
            event.preventDefault();
        }
    }, { passive: false });

    ['gesturestart', 'gesturechange', 'gestureend'].forEach(function(eventName) {
        document.addEventListener(eventName, function(event) {
            if (event.cancelable) {
                event.preventDefault();
            }
        }, { passive: false });
    });
})();
</script>
</body></html>
