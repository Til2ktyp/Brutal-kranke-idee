<!DOCTYPE html>
<html lang="de">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Kurve</title><script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5795114678692881" crossorigin="anonymous"></script>
<style>
:root{--bg-1:#0f172a;--bg-2:#312e81;--bg-3:#7c3aed;--border:rgba(255,255,255,.18);--text:#fff;--muted:rgba(255,255,255,.72);--accent:#fbc531;--accent-2:#38bdf8;--good:#26de81;--danger:#ef4444;--dark:#1e272e}*{box-sizing:border-box}body{min-height:100vh;margin:0;padding:92px 18px 48px;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;color:var(--text);background:radial-gradient(circle at 12% 18%,rgba(56,189,248,.34),transparent 28%),radial-gradient(circle at 88% 14%,rgba(251,197,49,.25),transparent 24%),radial-gradient(circle at 50% 100%,rgba(168,85,247,.33),transparent 33%),linear-gradient(135deg,var(--bg-1),var(--bg-2) 52%,var(--bg-3));overflow-x:hidden}body:before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.13;background-image:linear-gradient(rgba(255,255,255,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.08) 1px,transparent 1px);background-size:46px 46px;mask-image:radial-gradient(circle at center,#000,transparent 78%)}.back-home-btn{position:fixed;top:20px;left:20px;z-index:2;background:var(--accent);color:var(--dark);padding:12px 18px;border-radius:12px;font-weight:900;text-decoration:none;box-shadow:0 8px 20px rgba(0,0,0,.25)}
.shell{position:relative;z-index:1;width:min(1000px,100%);margin:0 auto}.hero{text-align:center;margin-bottom:20px}.eyebrow{display:inline-flex;margin-bottom:10px;padding:7px 12px;border-radius:999px;background:rgba(251,197,49,.16);color:#fde68a;border:1px solid rgba(251,197,49,.22);font-size:.8rem;font-weight:950;text-transform:uppercase}h1{margin:0;color:var(--accent);font-size:clamp(2.4rem,8vw,5rem);line-height:.95;font-weight:950}.subtitle{max-width:720px;margin:12px auto 0;color:var(--muted);line-height:1.55}.box{padding:22px;border:1px solid var(--border);border-radius:22px;background:linear-gradient(145deg,rgba(255,255,255,.16),rgba(255,255,255,.07));box-shadow:0 24px 70px rgba(0,0,0,.28);backdrop-filter:blur(18px)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}.stat{padding:13px;border-radius:14px;border:1px solid var(--border);background:rgba(255,255,255,.08)}.stat strong{display:block;color:var(--muted);font-size:.74rem;text-transform:uppercase}.stat span{display:block;margin-top:5px;font-size:1.45rem;font-weight:950}.chart{height:320px;border-radius:20px;border:1px solid var(--border);background:rgba(5,10,20,.48);overflow:hidden}canvas{width:100%;height:100%}.actions{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px}button{min-height:52px;border:0;border-radius:14px;padding:12px;background:linear-gradient(135deg,var(--accent-2),#2563eb);color:#07111f;cursor:pointer;font:inherit;font-weight:950;box-shadow:0 10px 24px rgba(37,99,235,.26)}button.sell{background:linear-gradient(135deg,var(--good),#20bf6b)}button.hold{background:linear-gradient(135deg,var(--accent),#f59e0b)}button.secondary{background:rgba(255,255,255,.12);color:var(--text);border:1px solid var(--border);box-shadow:none}.log{min-height:34px;margin-top:12px;text-align:center;color:var(--muted);font-weight:850}@media(max-width:760px){body{padding-top:86px}.stats,.actions{grid-template-columns:repeat(2,1fr)}}
</style></head>
<body><a class="back-home-btn" href="https://blopperbold.org">← BlopperBold</a><main class="shell"><section class="hero"><div class="eyebrow">Risiko-Klicker</div><h1>Kurve</h1><p class="subtitle">Kaufen, halten, verkaufen. Die Linie lockt, der Rücksetzer lauert. Kurze Runden, schnelle Entscheidungen.</p></section><section class="box"><div class="stats"><div class="stat"><strong>Cash</strong><span id="cash">1000</span></div><div class="stat"><strong>Position</strong><span id="pos">0</span></div><div class="stat"><strong>Preis</strong><span id="price">50</span></div><div class="stat"><strong>Best</strong><span id="best">1000</span></div></div><div class="chart"><canvas id="canvas"></canvas></div><div class="actions"><button id="buy">Kaufen</button><button class="sell" id="sell">Verkaufen</button><button class="hold" id="hold">Weiter</button><button class="secondary" id="reset">Reset</button></div><div class="log" id="log">Ziel: Wert am Ende maximieren. 80 Ticks.</div></section></main>
<script>
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d'),cashEl=document.getElementById('cash'),posEl=document.getElementById('pos'),priceEl=document.getElementById('price'),bestEl=document.getElementById('best'),logEl=document.getElementById('log');let cash=1000,pos=0,price=50,tick=0,prices=[],trend=0,best=Number(localStorage.getItem('kurveBest')||1000);bestEl.textContent=best;
function size(){canvas.width=canvas.clientWidth*devicePixelRatio;canvas.height=canvas.clientHeight*devicePixelRatio;ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);draw()}window.addEventListener('resize',size);
function update(){cashEl.textContent=Math.round(cash);posEl.textContent=pos;priceEl.textContent=price.toFixed(1);bestEl.textContent=Math.round(best)}
function draw(){const w=canvas.clientWidth,h=canvas.clientHeight;ctx.clearRect(0,0,w,h);ctx.strokeStyle='rgba(255,255,255,.12)';for(let i=1;i<5;i++){ctx.beginPath();ctx.moveTo(0,h*i/5);ctx.lineTo(w,h*i/5);ctx.stroke()}if(prices.length<2)return;const min=Math.min(...prices)-4,max=Math.max(...prices)+4;ctx.lineWidth=4;ctx.strokeStyle='#38bdf8';ctx.beginPath();prices.forEach((p,i)=>{const x=i/(79)*w,y=h-((p-min)/(max-min))*h;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)});ctx.stroke();ctx.fillStyle='rgba(251,197,49,.9)';const x=(prices.length-1)/79*w,y=h-((price-min)/(max-min))*h;ctx.beginPath();ctx.arc(x,y,6,0,Math.PI*2);ctx.fill()}
function step(){if(tick>=80){finish();return}trend+=Math.random()*.8-.38;trend*=.88;price=Math.max(4,price+trend+(Math.random()*4-1.8));prices.push(price);tick++;if(Math.random()<.07){price*=Math.random()<.5?.78:1.24;prices[prices.length-1]=price;logEl.textContent=price>prices[Math.max(0,prices.length-2)]?'Spike.':'Dip.'}else logEl.textContent='Tick '+tick+'/80';update();draw()}
function buy(){if(tick>=80)return;const amount=Math.floor(cash/price);if(amount<=0){logEl.textContent='Kein Cash.';return}pos+=amount;cash-=amount*price;step()}
function sell(){if(pos<=0){logEl.textContent='Keine Position.';step();return}cash+=pos*price;pos=0;step()}
function finish(){const total=cash+pos*price;if(total>best){best=total;localStorage.setItem('kurveBest',String(best));logEl.textContent='Neuer Bestwert: '+Math.round(best)}else logEl.textContent='Endwert: '+Math.round(total);pos=0;cash=total;update()}
function reset(){cash=1000;pos=0;price=50;tick=0;prices=[price];trend=0;logEl.textContent='Neue Kurve.';update();draw()}
document.getElementById('buy').addEventListener('click',buy);document.getElementById('sell').addEventListener('click',sell);document.getElementById('hold').addEventListener('click',step);document.getElementById('reset').addEventListener('click',reset);size();reset();
</script></body></html>
