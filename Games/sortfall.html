<!DOCTYPE html>
<html lang="de">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"><title>Sortfall</title><script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5795114678692881" crossorigin="anonymous"></script>
<style>
:root{--bg-1:#0f172a;--bg-2:#312e81;--bg-3:#7c3aed;--border:rgba(255,255,255,.18);--text:#fff;--muted:rgba(255,255,255,.72);--accent:#fbc531;--accent-2:#38bdf8;--good:#26de81;--danger:#ef4444;--dark:#1e272e}*{box-sizing:border-box}button,a,[role="button"]{-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation}body{min-height:100vh;margin:0;padding:92px 18px 48px;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;color:var(--text);background:radial-gradient(circle at 12% 18%,rgba(56,189,248,.34),transparent 28%),radial-gradient(circle at 88% 14%,rgba(251,197,49,.25),transparent 24%),radial-gradient(circle at 50% 100%,rgba(168,85,247,.33),transparent 33%),linear-gradient(135deg,var(--bg-1),var(--bg-2) 52%,var(--bg-3));overflow-x:hidden}body:before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.13;background-image:linear-gradient(rgba(255,255,255,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.08) 1px,transparent 1px);background-size:46px 46px;mask-image:radial-gradient(circle at center,#000,transparent 78%)}.back-home-btn{position:fixed;top:20px;left:20px;z-index:2;background:var(--accent);color:var(--dark);padding:12px 18px;border-radius:12px;font-weight:900;text-decoration:none;box-shadow:0 8px 20px rgba(0,0,0,.25)}
.shell{position:relative;z-index:1;width:min(1050px,100%);margin:0 auto}.hero{text-align:center;margin-bottom:20px}.eyebrow{display:inline-flex;margin-bottom:10px;padding:7px 12px;border-radius:999px;background:rgba(251,197,49,.16);color:#fde68a;border:1px solid rgba(251,197,49,.22);font-size:.8rem;font-weight:950;text-transform:uppercase}h1{margin:0;color:var(--accent);font-size:clamp(2.4rem,8vw,5rem);line-height:.95;font-weight:950}.subtitle{max-width:720px;margin:12px auto 0;color:var(--muted);line-height:1.55}.box{padding:22px;border:1px solid var(--border);border-radius:22px;background:linear-gradient(145deg,rgba(255,255,255,.16),rgba(255,255,255,.07));box-shadow:0 24px 70px rgba(0,0,0,.28);backdrop-filter:blur(18px)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}.stat{padding:13px;border-radius:14px;border:1px solid var(--border);background:rgba(255,255,255,.08)}.stat strong{display:block;color:var(--muted);font-size:.74rem;text-transform:uppercase}.stat span{display:block;margin-top:5px;font-size:1.45rem;font-weight:950}.card{min-height:170px;display:grid;place-items:center;text-align:center;padding:24px;border-radius:20px;border:1px solid var(--border);background:rgba(5,10,20,.48);font-size:clamp(1.5rem,5vw,3rem);font-weight:950}.bins{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:14px}button{min-height:58px;border:0;border-radius:14px;padding:12px;background:linear-gradient(135deg,var(--accent-2),#2563eb);color:#07111f;cursor:pointer;font:inherit;font-weight:950;box-shadow:0 10px 24px rgba(37,99,235,.26)}button.good{background:linear-gradient(135deg,var(--good),#20bf6b)}button.warn{background:linear-gradient(135deg,var(--accent),#f59e0b)}button.bad{background:linear-gradient(135deg,#fb7185,var(--danger));color:white}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.secondary{background:rgba(255,255,255,.12);color:var(--text);border:1px solid var(--border);box-shadow:none}.log{min-height:32px;margin-top:12px;text-align:center;color:var(--muted);font-weight:850}.pulse{animation:pulse .18s ease}@keyframes pulse{50%{transform:scale(1.015);filter:brightness(1.35)}}@media(max-width:720px){body{padding-top:86px}.stats,.bins{grid-template-columns:1fr}.row{grid-template-columns:1fr}}
</style><style>.dopamine-burst{position:fixed;z-index:9999;left:0;top:0;width:14px;height:14px;border:2px solid rgba(251,197,49,.95);border-radius:999px;pointer-events:none;transform:translate(-50%,-50%);animation:dopamineRing .55s ease-out forwards}.dopamine-spark{position:fixed;z-index:9999;left:0;top:0;width:7px;height:7px;border-radius:999px;background:#fbc531;pointer-events:none;transform:translate(-50%,-50%);animation:dopamineSpark .58s ease-out forwards}.dopamine-hit{animation:dopamineHit .22s ease}@keyframes dopamineRing{to{width:110px;height:110px;opacity:0}}@keyframes dopamineSpark{to{transform:translate(calc(-50% + var(--x)),calc(-50% + var(--y))) scale(.2);opacity:0}}@keyframes dopamineHit{50%{filter:brightness(1.35) saturate(1.4);transform:scale(1.035)}}</style><style id="bb-touch-zoom-guard-style">
    html,
    body {
        touch-action: manipulation;
        -ms-touch-action: manipulation;
        -webkit-text-size-adjust: 100%;
    }
</style>
</head>
<body><a class="back-home-btn" href="https://blopperbold.org">← BlopperBold</a><main class="shell"><section class="hero"><div class="eyebrow">Sortier-Flow</div><h1>Sortfall</h1><p class="subtitle">Ein Begriff, drei Schubladen. Schnell entscheiden, Serie halten, Chaos sortieren.</p></section><section class="box"><div class="stats"><div class="stat"><strong>Score</strong><span id="score">0</span></div><div class="stat"><strong>Serie</strong><span id="streak">0</span></div><div class="stat"><strong>Zeit</strong><span id="time">60</span></div><div class="stat"><strong>Best</strong><span id="best">0</span></div></div><div class="card" id="card">Start</div><div class="bins"><button class="good" data-type="jetzt">Jetzt</button><button class="warn" data-type="plan">Planen</button><button class="bad" data-type="weg">Weg</button></div><div class="row"><button id="start">Start</button><button class="secondary" id="reset">Reset</button></div><div class="log" id="log">Sortiere schnell. Tastatur: 1, 2, 3.</div></section></main>
<script>
const items=[['Matheaufgabe','jetzt'],['Wasser trinken','jetzt'],['Handy-Scroll','weg'],['Referat vorbereiten','plan'],['Schreibtisch frei machen','jetzt'],['Neues Abo kaufen','weg'],['Lernzettel schreiben','plan'],['Fenster öffnen','jetzt'],['Noch ein Video','weg'],['Kalender checken','jetzt'],['Projektidee notieren','plan'],['Impulskauf','weg'],['Mail beantworten','jetzt'],['Training planen','plan'],['Alte Tabs schließen','weg'],['Vokabeln 10 Minuten','jetzt'],['Budget prüfen','plan'],['Rabattcode jagen','weg'],['Tasche packen','jetzt'],['Schlaf nachholen','plan'],['Drama-Chat öffnen','weg'],['Datei benennen','jetzt'],['Termin machen','plan'],['Sinnlos vergleichen','weg'],['Kurze Pause','jetzt'],['Wochenziel setzen','plan'],['Push-Nachrichten','weg']];
const card=document.getElementById('card'),scoreEl=document.getElementById('score'),streakEl=document.getElementById('streak'),timeEl=document.getElementById('time'),bestEl=document.getElementById('best'),logEl=document.getElementById('log');let current=null,score=0,streak=0,time=60,running=false,timer=null,best=Number(localStorage.getItem('sortfallBest')||0);bestEl.textContent=best;
function saveState(){localStorage.setItem('sortfallState',JSON.stringify({current,score,streak,time,best,card:card.textContent,log:logEl.textContent}))}
function pick(){current=items[Math.floor(Math.random()*items.length)];card.textContent=current[0];saveState()}
function render(){scoreEl.textContent=score;streakEl.textContent=streak;timeEl.textContent=time;bestEl.textContent=best}
function update(){render();saveState()}
function loadState(){const raw=localStorage.getItem('sortfallState');if(!raw){render();return}try{const state=JSON.parse(raw);current=state.current||current;score=state.score||0;streak=state.streak||0;time=state.time||60;best=state.best||best;card.textContent=state.card||'Start';logEl.textContent=state.log||logEl.textContent;render()}catch(error){render()}}
function start(){score=0;streak=0;time=60;running=true;update();pick();logEl.textContent='Los.';clearInterval(timer);timer=setInterval(()=>{time--;update();if(time<=0)finish()},1000)}
function finish(){running=false;clearInterval(timer);if(score>best){best=score;localStorage.setItem('sortfallBest',best);logEl.textContent='Neuer Highscore: '+best}else logEl.textContent='Fertig. Score '+score;card.textContent='Fertig';update()}
function choose(type){if(!running)return;if(type===current[1]){streak++;score+=12+streak*2;logEl.textContent='Richtig'}else{streak=0;score=Math.max(0,score-8);logEl.textContent='Nope: '+current[1]}card.classList.add('pulse');setTimeout(()=>card.classList.remove('pulse'),160);pick();update()}
document.querySelectorAll('[data-type]').forEach(b=>b.addEventListener('click',()=>choose(b.dataset.type)));document.addEventListener('keydown',e=>{if(e.key==='1')choose('jetzt');if(e.key==='2')choose('plan');if(e.key==='3')choose('weg')});document.getElementById('start').addEventListener('click',start);document.getElementById('reset').addEventListener('click',()=>{localStorage.removeItem('sortfallBest');localStorage.removeItem('sortfallState');current=null;score=0;streak=0;time=60;best=0;card.textContent='Start';logEl.textContent='Cache gelöscht.';update()});document.addEventListener('contextmenu',event=>{if(event.target.closest('button, a, [role="button"]'))event.preventDefault()});loadState();
document.addEventListener('click',event=>{const target=event.target.closest('button,a,[role="button"]');if(!target)return;target.classList.remove('dopamine-hit');void target.offsetWidth;target.classList.add('dopamine-hit');const ring=document.createElement('span');ring.className='dopamine-burst';ring.style.left=event.clientX+'px';ring.style.top=event.clientY+'px';document.body.append(ring);setTimeout(()=>ring.remove(),620);for(let i=0;i<12;i++){const spark=document.createElement('span');spark.className='dopamine-spark';spark.style.left=event.clientX+'px';spark.style.top=event.clientY+'px';spark.style.background=i%3===0?'#38bdf8':i%3===1?'#fbc531':'#26de81';const angle=Math.random()*Math.PI*2,dist=32+Math.random()*42;spark.style.setProperty('--x',Math.cos(angle)*dist+'px');spark.style.setProperty('--y',Math.sin(angle)*dist+'px');document.body.append(spark);setTimeout(()=>spark.remove(),650)}});
</script><script id="bb-touch-zoom-guard">
(function() {
    if (window.__bbTouchZoomGuard) return;
    window.__bbTouchZoomGuard = true;

    let lastTouchEnd = 0;

    document.addEventListener('touchend', function(event) {
        const now = Date.now();

        if (now - lastTouchEnd <= 350 && event.cancelable) {
            event.preventDefault();
        }

        lastTouchEnd = now;
    }, { passive: false });

    document.addEventListener('dblclick', function(event) {
        if (event.cancelable) {
            event.preventDefault();
        }
    }, { passive: false });

    ['gesturestart', 'gesturechange', 'gestureend'].forEach(function(eventName) {
        document.addEventListener(eventName, function(event) {
            if (event.cancelable) {
                event.preventDefault();
            }
        }, { passive: false });
    });
})();
</script>
</body></html>
