    <style>
        :root {
            --bg-1: #0f172a;
            --bg-2: #312e81;
            --bg-3: #7c3aed;
            --border: rgba(255, 255, 255, 0.18);
            --text: #ffffff;
            --muted: rgba(255, 255, 255, 0.72);
            --accent: #fbc531;
            --accent-2: #38bdf8;
            --danger: #dc3545;
        }

        * {
            box-sizing: border-box;
        }

        button,
        a,
        [role="button"] {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body {
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            margin: 0;
            padding: 36px 18px 72px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            background:
                radial-gradient(circle at 12% 18%, rgba(56, 189, 248, 0.34), transparent 28%),
                radial-gradient(circle at 88% 14%, rgba(251, 197, 49, 0.25), transparent 24%),
                radial-gradient(circle at 50% 100%, rgba(168, 85, 247, 0.33), transparent 33%),
                linear-gradient(135deg, var(--bg-1), var(--bg-2) 52%, var(--bg-3));
            overflow-x: hidden;
        }

        .noise-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            opacity: 0.13;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.08) 1px, transparent 1px);
            background-size: 46px 46px;
            mask-image: radial-gradient(circle at center, black, transparent 78%);
        }

        .container {
            position: relative;
            z-index: 1;
            width: min(780px, 100%);
            padding: 34px;
            border-radius: 28px;
            border: 1px solid var(--border);
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.07));
            box-shadow: 0 30px 90px rgba(0, 0, 0, 0.32);
            backdrop-filter: blur(18px);
        }

        h1 {
            margin: 0 0 24px;
            font-size: clamp(2rem, 6vw, 3.2rem);
            line-height: 1.05;
            font-weight: 900;
            text-align: center;
            color: var(--accent);
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .controls label {
            font-size: 1rem;
            color: var(--muted);
        }

        input[type="number"] {
            width: 100px;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.92);
            color: #1e272e;
            font-size: 1rem;
        }

        .buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 24px;
        }

        button {
            padding: 16px 28px;
            border-radius: 14px;
            border: none;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }

        button.primary {
            background: linear-gradient(135deg, var(--accent-2), #2563eb);
            color: #1e272e;
            box-shadow: 0 10px 28px rgba(37, 99, 235, 0.34);
        }

        button.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 34px rgba(37, 99, 235, 0.42);
        }

        button.primary:active {
            transform: translateY(0);
            box-shadow: 0 6px 18px rgba(37, 99, 235, 0.34);
        }

        button.danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: #1e272e;
            box-shadow: 0 10px 28px rgba(220, 38, 38, 0.34);
        }

        button.danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 34px rgba(220, 38, 38, 0.42);
        }

        button.danger:active {
            transform: translateY(0);
            box-shadow: 0 6px 18px rgba(220, 38, 38, 0.34);
        }

        #currentValue {
            font-size: clamp(2.2rem, 6vw, 3.4rem);
            font-weight: 900;
            text-align: center;
            color: var(--accent-2);
            margin: 0;
        }

        #totalReturn {
            font-size: clamp(1.2rem, 3vw, 1.6rem);
            font-weight: 700;
            text-align: center;
            color: var(--accent);
            margin: 6px 0 0;
        }

        #chartContainer {
            width: 100%;
            max-width: 680px;
            margin: 28px auto 0;
            padding: 24px;
            border-radius: 22px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--border);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06), 0 18px 40px rgba(0, 0, 0, 0.22);
            backdrop-filter: blur(10px);
            height: 450px;
        }

        #chartContainer canvas {
            height: 100% !important;
        }

        .back-home-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1002;
            background: #fbc531;
            color: #1e272e;
            padding: 12px 18px;
            border-radius: 12px;
            font-weight: bold;
            text-decoration: none;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: background 0.18s ease, transform 0.18s ease;
        }

        .back-home-btn:hover {
            background: #fda502;
            transform: translateX(2px);
        }
    </style>

<body><button class="bb-hyper-toggle" id="bbHyperToggle" type="button" aria-label="Hyperaktivitäts-Einstellungen" aria-expanded="false">⚙</button><div class="bb-hyper-panel" id="bbHyperPanel" aria-hidden="true"><p class="bb-hyper-title" id="bbHyperTitle">Hyper-Einstellungen</p><p class="bb-hyper-subtitle">Dopamin-Spikes, Glitzer, Pop und Klick-Explosionen. Kann jederzeit wieder ruhig gestellt werden.</p><label class="bb-hyper-row"><span>Hyperaktivitätsmodus</span><span class="bb-hyper-switch"><input id="bbHyperMode" type="checkbox"><span class="bb-hyper-slider"></span></span></label><label class="bb-hyper-row"><span>Klick-Explosionen</span><span class="bb-hyper-switch"><input id="bbHyperClicks" type="checkbox"><span class="bb-hyper-slider"></span></span></label><label class="bb-hyper-row"><span>Glitzerregen</span><span class="bb-hyper-switch"><input id="bbHyperAmbient" type="checkbox"><span class="bb-hyper-slider"></span></span></label><p class="bb-hyper-note">Die Einstellung wird pro Seite gespeichert.</p></div>

    <div class="noise-layer" aria-hidden="true"></div>

    <main class="container">
        <h1>Exponentieller Klick‑Zähler</h1>

        <div class="controls">
            <label for="increasePercentage">Steigerung pro Klick (%)</label>
            <input type="number" id="increasePercentage" value="10" min="0.1" step="0.1">
        </div>

        <div class="buttons">
            <button id="clickButton" class="primary">Klicke mich!</button>
            <button id="resetButton" class="danger">Zurücksetzen</button>
        </div>

        <p id="currentValue">1,00 €</p>
        <p id="totalReturn">Gesamtrendite: 0,00 %</p>

        <div id="chartContainer">
            <canvas id="valueChart"></canvas>
        </div>
    </main>

    <a class="back-home-btn" href="https://blopperbold.org">← Zurück zu BlopperBold</a>

    <script>
        const clickButton = document.getElementById('clickButton');
        const resetButton = document.getElementById('resetButton');
        const currentValueDisplay = document.getElementById('currentValue');
        const totalReturnDisplay = document.getElementById('totalReturn');
        const increasePercentageInput = document.getElementById('increasePercentage');
        const valueChartCanvas = document.getElementById('valueChart');

        const initialValue = 1.00;
        let currentValue;
        let clickCount;
        let chartLabels;
        let chartData;

        function saveData() {
            localStorage.setItem('currentValue', currentValue);
            localStorage.setItem('clickCount', clickCount);
            localStorage.setItem('chartLabels', JSON.stringify(chartLabels));
            localStorage.setItem('chartData', JSON.stringify(chartData));
            localStorage.setItem('increasePercentage', increasePercentageInput.value);
        }

        function loadData() {
            const savedValue = localStorage.getItem('currentValue');
            const savedClickCount = localStorage.getItem('clickCount');
            const savedChartLabels = localStorage.getItem('chartLabels');
            const savedChartData = localStorage.getItem('chartData');
            const savedIncreasePercentage = localStorage.getItem('increasePercentage');

            if (savedValue !== null) {
                currentValue = parseFloat(savedValue);
                clickCount = parseInt(savedClickCount);
                chartLabels = JSON.parse(savedChartLabels);
                chartData = JSON.parse(savedChartData);
                increasePercentageInput.value = parseFloat(savedIncreasePercentage);
            } else {
                currentValue = initialValue;
                clickCount = 0;
                chartLabels = [0];
                chartData = [currentValue];
                increasePercentageInput.value = 10;
            }
        }

        loadData();

        const valueChart = new Chart(valueChartCanvas, {
            type: 'line',
            data: {
                labels: chartLabels,
                datasets: [
                    {
                        label: 'Wert in €',
                        data: chartData,
                        borderColor: '#007bff',
                        backgroundColor: 'rgba(0, 123, 255, 0.2)',
                        fill: true,
                        tension: 0.1
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: {
                        ticks: {
                            color: '#E6EAF1'      // helle Farbe für die X‑Achsen‑Beschriftung
                        },
                        title: {
                            display: true,
                            text: 'Anzahl der Klicks',
                            color: '#E6EAF1'  // Titel der X‑Achse ebenfalls hell
                        }
                    },
                    y: {
                        ticks: {
                            color: '#E6EAF1'      // helle Farbe für die Y‑Achsen‑Beschriftung
                        },
                        title: {
                            display: true,
                            text: 'Wert (€)',
                            color: '#E6EAF1'  // Titel der Y‑Achse hell
                        },
                        beginAtZero: true
                    }
                },
                plugins: {
                    legend: {
                        labels: {
                            color: '#E6EAF1'  // helle Schrift für die Legende
                        }
                    },
                    tooltip: {
                        callbacks: {
                            label: function (context) {
                                return context.dataset.label + ': ' +
                                    context.parsed.y.toFixed(2) + ' €';
                            }
                        }
                    }
                }
            }
        });

        function updateDisplay() {
            currentValueDisplay.textContent = currentValue.toFixed(2) + ' €';
            const totalReturnPercentage = ((currentValue - initialValue) / initialValue) * 100;
            totalReturnDisplay.textContent = `Gesamtrendite: ${totalReturnPercentage.toFixed(2)} %`;
        }

        function addDataToChart() {
            chartLabels.push(clickCount);
            chartData.push(currentValue);
            valueChart.update();
        }

        clickButton.addEventListener('click', () => {
            const increasePercent = parseFloat(increasePercentageInput.value);
            if (isNaN(increasePercent) || increasePercent < 0) {
                alert('Bitte geben Sie einen gültigen positiven Prozentsatz ein.');
                return;
            }
            const multiplier = 1 + (increasePercent / 100);
            currentValue *= multiplier;
            clickCount++;
            updateDisplay();
            addDataToChart();
            saveData();
        });

        resetButton.addEventListener('click', () => {
            currentValue = initialValue;
            clickCount = 0;
            chartLabels = [0];
            chartData = [currentValue];
            valueChart.data.labels = chartLabels;
            valueChart.data.datasets[0].data = chartData;
            valueChart.update();
            updateDisplay();
            saveData();
        });

        updateDisplay();
        valueChart.update();

        document.addEventListener('contextmenu', event => {
            if (event.target.closest('button, a, [role="button"]')) {
                event.preventDefault();
            }
        });
    </script>

<script id="bb-touch-zoom-guard">
(function() {
    if (window.__bbTouchZoomGuard) return;
    window.__bbTouchZoomGuard = true;

    let lastTouchEnd = 0;
    const interactiveSelector = 'button, a, input, select, textarea, label, [role="button"], .progress-bar-container, .card, .chart';

    document.addEventListener('touchend', function(event) {
        const now = Date.now();
        const isInteractive = event.target.closest && event.target.closest(interactiveSelector);

        if (!isInteractive && now - lastTouchEnd <= 350 && event.cancelable) {
            event.preventDefault();
        }

        lastTouchEnd = now;
    }, { passive: false });

    document.addEventListener('dblclick', function(event) {
        if (event.cancelable) {
            event.preventDefault();
        }
    }, { passive: false });

    ['gesturestart', 'gesturechange', 'gestureend'].forEach(function(eventName) {
        document.addEventListener(eventName, function(event) {
            if (event.cancelable) {
                event.preventDefault();
            }
        }, { passive: false });
    });
})();
</script>
<script id="bb-hyper-script">
(function(){
  if(window.__bbHyperController)return;
  window.__bbHyperController=true;
  const key='bbHyper:games';
  const gear=document.getElementById('bbHyperToggle');
  const panel=document.getElementById('bbHyperPanel');
  const title=document.getElementById('bbHyperTitle');
  const mode=document.getElementById('bbHyperMode');
  const clicks=document.getElementById('bbHyperClicks');
  const ambient=document.getElementById('bbHyperAmbient');
  if(!gear||!panel||!mode||!clicks||!ambient)return;
  title.textContent=(document.title||'BlopperBold')+' Einstellungen';
  let closeTimer=0;
  let state;
  try{state=JSON.parse(localStorage.getItem(key)||'null')}catch(error){state=null}
  if(!state)state={mode:true,clicks:true,ambient:true};
  function save(){localStorage.setItem(key,JSON.stringify(state))}
  function toast(text){if(!state.mode)return;const el=document.createElement('div');el.className='bb-hyper-toast';el.textContent=text;document.body.append(el);setTimeout(()=>el.remove(),950)}
  function apply(){document.body.classList.toggle('bb-hyper-on',!!state.mode);document.body.classList.toggle('bb-hyper-clicks-on',!!state.mode&&!!state.clicks);gear.classList.toggle('is-on',!!state.mode);mode.checked=!!state.mode;clicks.checked=!!state.clicks;ambient.checked=!!state.ambient;save()}
  function openPanel(){clearTimeout(closeTimer);panel.classList.remove('closing');panel.classList.add('show');panel.setAttribute('aria-hidden','false');gear.setAttribute('aria-expanded','true')}
  function closePanel(){if(!panel.classList.contains('show'))return;clearTimeout(closeTimer);panel.classList.remove('show');panel.classList.add('closing');panel.setAttribute('aria-hidden','true');gear.setAttribute('aria-expanded','false');closeTimer=setTimeout(()=>panel.classList.remove('closing'),220)}
  function burst(x,y,amount){if(!state.mode||!state.clicks)return;const colors=['#fbc531','#38bdf8','#26de81','#fb7185','#a78bfa','#fff'];for(let i=0;i<amount;i++){const s=document.createElement('span');s.className='bb-hyper-spark';s.style.left=x+'px';s.style.top=y+'px';s.style.setProperty('--bb-c',colors[i%colors.length]);const angle=Math.random()*Math.PI*2;const dist=38+Math.random()*96;s.style.setProperty('--bb-x',Math.cos(angle)*dist+'px');s.style.setProperty('--bb-y',Math.sin(angle)*dist+'px');document.body.append(s);setTimeout(()=>s.remove(),950)}}
  gear.addEventListener('click',event=>{event.stopPropagation();panel.classList.contains('show')?closePanel():openPanel();burst(event.clientX,event.clientY,18)});
  panel.addEventListener('click',event=>event.stopPropagation());
  document.addEventListener('click',event=>{if(!panel.contains(event.target)&&event.target!==gear)closePanel()});
  document.addEventListener('keydown',event=>{if(event.key==='Escape')closePanel()});
  mode.addEventListener('change',()=>{state.mode=mode.checked;apply();toast(state.mode?'Hypermodus an':'Hypermodus aus')});
  clicks.addEventListener('change',()=>{state.clicks=clicks.checked;apply();toast(state.clicks?'Klicks glitzern':'Klicks ruhig')});
  ambient.addEventListener('change',()=>{state.ambient=ambient.checked;apply();toast(state.ambient?'Glitzerregen an':'Glitzerregen aus')});
  document.addEventListener('click',event=>{const target=event.target.closest('button,a,[role="button"],.progress-bar-container,.card,.chart');if(!target||target.closest('.bb-hyper-panel'))return;burst(event.clientX,event.clientY,target.id==='bbHyperToggle'?18:26)});
  setInterval(()=>{if(!state.mode||!state.ambient||document.hidden)return;const star=document.createElement('span');star.className='bb-hyper-star';star.style.left=Math.random()*100+'vw';star.style.top='-12px';star.style.setProperty('--bb-x',(Math.random()*90-45)+'px');document.body.append(star);setTimeout(()=>star.remove(),2100)},180);
  apply();
})();
</script>

</body>
</html>
