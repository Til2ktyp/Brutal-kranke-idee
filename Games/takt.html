<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Takt</title>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5795114678692881" crossorigin="anonymous"></script>
<style>
:root{--bg-1:#0f172a;--bg-2:#312e81;--bg-3:#7c3aed;--border:rgba(255,255,255,.18);--text:#fff;--muted:rgba(255,255,255,.72);--accent:#fbc531;--accent-2:#38bdf8;--good:#26de81;--danger:#ef4444;--dark:#1e272e}*{box-sizing:border-box}body{min-height:100vh;margin:0;padding:92px 18px 48px;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;color:var(--text);background:radial-gradient(circle at 12% 18%,rgba(56,189,248,.34),transparent 28%),radial-gradient(circle at 88% 14%,rgba(251,197,49,.25),transparent 24%),radial-gradient(circle at 50% 100%,rgba(168,85,247,.33),transparent 33%),linear-gradient(135deg,var(--bg-1),var(--bg-2) 52%,var(--bg-3));overflow-x:hidden}body:before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.13;background-image:linear-gradient(rgba(255,255,255,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.08) 1px,transparent 1px);background-size:46px 46px;mask-image:radial-gradient(circle at center,#000,transparent 78%)}.back-home-btn{position:fixed;top:20px;left:20px;z-index:2;background:var(--accent);color:var(--dark);padding:12px 18px;border-radius:12px;font-weight:900;text-decoration:none;box-shadow:0 8px 20px rgba(0,0,0,.25)}
.shell{position:relative;z-index:1;width:min(900px,100%);margin:0 auto}.hero{text-align:center;margin-bottom:20px}.eyebrow{display:inline-flex;margin-bottom:10px;padding:7px 12px;border-radius:999px;background:rgba(251,197,49,.16);color:#fde68a;border:1px solid rgba(251,197,49,.22);font-size:.8rem;font-weight:950;text-transform:uppercase}h1{margin:0;color:var(--accent);font-size:clamp(2.4rem,8vw,5rem);line-height:.95;font-weight:950}.subtitle{max-width:680px;margin:12px auto 0;color:var(--muted);line-height:1.55}.box{padding:24px;border:1px solid var(--border);border-radius:24px;background:linear-gradient(145deg,rgba(255,255,255,.16),rgba(255,255,255,.07));box-shadow:0 24px 70px rgba(0,0,0,.28);backdrop-filter:blur(18px)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}.stat{padding:14px;border-radius:14px;border:1px solid var(--border);background:rgba(255,255,255,.08)}.stat strong{display:block;color:var(--muted);font-size:.74rem;text-transform:uppercase}.stat span{display:block;margin-top:5px;font-size:1.45rem;font-weight:950}.track{position:relative;height:124px;border-radius:20px;border:1px solid var(--border);background:rgba(5,10,20,.48);overflow:hidden}.zone{position:absolute;left:50%;top:0;bottom:0;width:74px;transform:translateX(-50%);background:linear-gradient(180deg,rgba(38,222,129,.1),rgba(251,197,49,.2));border-left:2px solid rgba(251,197,49,.8);border-right:2px solid rgba(251,197,49,.8)}.beat{position:absolute;top:34px;width:56px;height:56px;border-radius:18px;background:linear-gradient(135deg,var(--accent-2),var(--accent));box-shadow:0 16px 40px rgba(0,0,0,.3)}.hit{animation:hit .22s ease}.miss{animation:miss .22s ease}button{min-height:50px;border:0;border-radius:13px;padding:12px 16px;background:linear-gradient(135deg,var(--accent-2),#2563eb);color:#07111f;cursor:pointer;font:inherit;font-weight:950;box-shadow:0 10px 24px rgba(37,99,235,.26)}.tap{width:100%;margin-top:16px;font-size:1.2rem}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}.secondary{background:rgba(255,255,255,.12);color:var(--text);border:1px solid var(--border);box-shadow:none}.log{min-height:30px;margin-top:14px;color:var(--muted);font-weight:850;text-align:center}@keyframes hit{50%{filter:brightness(1.8);transform:scale(1.01)}}@keyframes miss{50%{filter:hue-rotate(120deg) brightness(1.2)}}@media(max-width:700px){body{padding-top:86px}.stats{grid-template-columns:repeat(2,1fr)}}
</style></head>
<body><a class="back-home-btn" href="https://blopperbold.org">← BlopperBold</a><main class="shell"><section class="hero"><div class="eyebrow">Timing-Spiel</div><h1>Takt</h1><p class="subtitle">Triff den Beat in der goldenen Zone. Space, Enter oder der große Button. Perfekt fühlt gefährlich gut.</p></section><section class="box"><div class="stats"><div class="stat"><strong>Score</strong><span id="score">0</span></div><div class="stat"><strong>Serie</strong><span id="streak">0</span></div><div class="stat"><strong>Runde</strong><span id="round">0/30</span></div><div class="stat"><strong>Best</strong><span id="best">0</span></div></div><div class="track" id="track"><div class="zone"></div></div><button class="tap" id="tap">Takt treffen</button><div class="row"><button id="start">Start</button><button class="secondary" id="reset">Reset</button></div><div class="log" id="log">Start drücken, dann im Fenster treffen.</div></section></main>
<script>
const track=document.getElementById('track'),scoreEl=document.getElementById('score'),streakEl=document.getElementById('streak'),roundEl=document.getElementById('round'),bestEl=document.getElementById('best'),logEl=document.getElementById('log');let beat=null,pos=0,speed=4.2,raf=null,score=0,streak=0,round=0,running=false,best=Number(localStorage.getItem('taktBest')||0);bestEl.textContent=best;
function update(){scoreEl.textContent=score;streakEl.textContent=streak;roundEl.textContent=round+'/30';bestEl.textContent=best}
function makeBeat(){beat=document.createElement('div');beat.className='beat';track.append(beat);pos=-70;speed=3.45+Math.min(4.25,round*.16)}
function loop(){if(!running)return;pos+=speed;beat.style.left=pos+'px';if(pos>track.clientWidth+70){miss('Vorbei');next()}else raf=requestAnimationFrame(loop)}
function next(){cancelAnimationFrame(raf);if(beat)beat.remove();round++;update();if(round>=30){finish();return}makeBeat();raf=requestAnimationFrame(loop)}
function start(){cancelAnimationFrame(raf);score=0;streak=0;round=0;running=true;track.querySelectorAll('.beat').forEach(b=>b.remove());update();makeBeat();raf=requestAnimationFrame(loop);logEl.textContent='Los.'}
function finish(){running=false;if(score>best){best=score;localStorage.setItem('taktBest',best);logEl.textContent='Neuer Highscore: '+best}else logEl.textContent='Fertig. Score '+score;update()}
function miss(text){streak=0;track.classList.add('miss');logEl.textContent=text;setTimeout(()=>track.classList.remove('miss'),180)}
function tap(){if(!running||!beat)return;const center=pos+28,target=track.clientWidth/2,dist=Math.abs(center-target);if(dist<18){streak++;score+=60+streak*8;logEl.textContent='Perfekt'}else if(dist<42){streak++;score+=28+streak*4;logEl.textContent='Gut'}else{miss('Daneben');next();return}track.classList.add('hit');setTimeout(()=>track.classList.remove('hit'),180);next()}
document.getElementById('start').addEventListener('click',start);document.getElementById('tap').addEventListener('click',tap);document.addEventListener('keydown',e=>{if(e.key===' '||e.key==='Enter'){e.preventDefault();tap()}});document.getElementById('reset').addEventListener('click',()=>{localStorage.removeItem('taktBest');best=0;update()});
</script></body></html>
