.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}.stat{padding:14px;border-radius:14px;border:1px solid var(--border);background:rgba(255,255,255,.08);transition:transform .16s ease,border-color .16s ease,box-shadow .16s ease;overflow:visible}.stat strong{display:block;color:var(--muted);font-size:.74rem;text-transform:uppercase}.stat span{display:block;margin-top:5px;font-size:1.45rem;font-weight:950}.stat.bump{transform:translateY(-2px) scale(1.04);border-color:rgba(251,197,49,.5);box-shadow:0 15px 34px rgba(251,197,49,.18)}.track{position:relative;height:124px;border-radius:20px;border:1px solid var(--border);background:radial-gradient(circle at 50% 50%,rgba(56,189,248,.12),transparent 42%),rgba(5,10,20,.48);overflow:hidden}.track:before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);transform:translateX(-100%);animation:scan 2.8s linear infinite;pointer-events:none}.zone{position:absolute;left:50%;top:0;bottom:0;width:74px;transform:translateX(-50%);background:linear-gradient(180deg,rgba(38,222,129,.1),rgba(251,197,49,.2));border-left:2px solid rgba(251,197,49,.8);border-right:2px solid rgba(251,197,49,.8);box-shadow:0 0 34px rgba(251,197,49,.18)}.beat{position:absolute;top:34px;width:56px;height:56px;border-radius:18px;background:linear-gradient(135deg,var(--accent-2),var(--accent));box-shadow:0 16px 40px rgba(0,0,0,.3),0 0 24px rgba(56,189,248,.32)}.burst{position:absolute;width:10px;height:10px;border-radius:999px;background:var(--accent);pointer-events:none;animation:burst .62s ease forwards}.ring{position:absolute;width:56px;height:56px;border:2px solid rgba(251,197,49,.9);border-radius:999px;pointer-events:none;animation:ring .52s ease-out forwards}.hit{animation:hit .3s ease}.perfect{animation:perfect .42s ease}.miss{animation:miss .22s ease}button{min-height:50px;border:0;border-radius:13px;padding:12px 16px;background:linear-gradient(135deg,var(--acc e{content:"";position:absolute;inset:0 auto 0 0;z-index:-1;width:100%;background:linear-gradient(90deg,rgba(251,197,49,.92),rgba(56,189,248,.9),rgba(38,222,129,.9));transform:scaleX(var(--hold-progress));transform-origin:left center;transition:transform .08s linear;box-shadow:0 0 26px rgba(251,197,49,.28)}.hold-reset .reset-label{position:relative;z-index:1}.hold-reset.holding{animation:resetCharge .55s ease-in-out infinite alternate;transform:scale(var(--egg-scale))}.hold-reset.reset-ready{box-shadow:0 0 32px rgba(38,222,129,.3),0 10px 24px rgba(0,0,0,.22)}.hold-reset.easter-growing{z-index:20;animation:resetEasterShake .18s linear infinite;transform:scale(var(--egg-scale)) rotate(calc((var(--hold-progress) - 1) * 2deg))}.hold-reset.exploding{animation:resetExplode .62s cubic-bezier(.18,.9,.24,1) forwards}.reset-pop{position:fixed;z-index:9998;width:12px;height:12px;border-radius:999px;left:var(--x);top:var(--y);pointer-events:none;background:var(--c);box-shadow:0 0 22px var(--c);animation:resetParticle .78s ease-out forwards}.reset-shockwave{position:fixed;z-index:9997;left:var(--x);top:var(--y);width:44px;height:44px;border:2px solid rgba(251,197,49,.95);border-radius:999px;pointer-events:none;transform:translate(-50%,-50%);animation:resetShockwave .72s ease-out forwards}@keyframes resetCharge{from{filter:brightness(1)}to{filter:brightness(1.24) saturate(1.35)}}@keyframes resetEasterShake{25%{filter:hue-rotate(70deg) brightness(1.35)}50%{filter:hue-rotate(150deg) brightness(1.5)}75%{filter:hue-rotate(260deg) brightness(1.25)}}@keyframes resetExplode{35%{transform:scale(3.6) rotate(6deg);filter:brightness(2.1) saturate(2)}70%{transform:scale(.08) rotate(-18deg);opacity:0;filter:blur(6px)}to{transform:scale(1);opacity:1;filter:blur(0)}}@keyframes resetParticle{to{transform:translate(var(--dx),var(--dy)) scale(.12) rotate(180deg);opacity:0}}@keyframes resetShockwave{to{width:360px;height:360px;opacity:0}}@media(prefers-reduced-motion:reduce){.stat-value-change,.hold-reset.holding,.hold-reset.easter-growing,.hold-reset.exploding,.reset-pop,.reset-shockwave{animation:none!important}}</style><style>.dopamine-burst{position:fixed;z-index:9999;left:0;top:0;width:14px;height:14px;border:2px solid rgba(251,197,49,.95);border-radius:999px;pointer-events:none;transform:translate(-50%,-50%);animation:dopamineRing .55s ease-out forwards}.dopamine-spark{position:fixed;z-index:9999;left:0;top:0;width:7px;height:7px;border-radius:999px;background:#fbc531;pointer-events:none;transform:translate(-50%,-50%);animation:dopamineSpark .58s ease-out forwards}.dopamine-hit{animation:dopamineHit .22s ease}@keyframes dopamineRing{to{width:110px;height:110px;opacity:0}}@keyframes dopamineSpark{to{transform:translate(calc(-50% + var(--x)),calc(-50% + var(--y))) scale(.2);opacity:0}}@keyframes dopamineHit{50%{filter:brightness(1.35) saturate(1.4);transform:scale(1.035)}}</style><style id="bb-touch-zoom-guard-style">

<body><a class="back-home-btn" href="https://blopperbold.org">← BlopperBold</a><main class="shell"><section class="hero"><div class="eyebrow">Timing-Spiel</div><h1>Takt</h1><p class="subtitle">Triff den Beat in der goldenen Zone. Space, Enter oder der große Button. Perfekt fühlt gefährlich gut.</p></section><section class="box"><div class="stats"><div class="stat"><strong>Score</strong><span id="score">0</span></div><div class="stat"><strong>Serie</strong><span id="streak">0</span></div><div class="stat"><strong>Runde</strong><span id="round">0/30</span></div><div class="stat"><strong>Best</strong><span id="best">0</span></div></div><div class="track" id="track"><div class="zone"></div></div><div class="controls"><button class="difficulty-button" id="difficultyButton" type="button">Normal<span>Schwierigkeit</span></button></div><div class="debug-panel" id="debugPanel" aria-hidden="true"><p class="debug-title">Debug</p><label class="debug-toggle"><input type="checkbox" id="debugAutoToggle"><span>Automatisch klicken</span></label><label class="debug-toggle"><input type="checkbox" id="debugSlowToggle"><span>Slow Motion</span></label><div class="debug-actions"><button id="debugPerfect" type="button">Perfect</button><button id="debugFinish" type="button">Finish</button></div></div><button class="tap" id="tap">Takt treffen</button><div class="row"><button id="start">Start</button><button class="secondary hold-reset" id="reset" type="button"><span class="reset-label">Reset halten</span></button></div><div class="log reality-check-text" id="log">Start drücken, dann im Fenster treffen.</div></section></main><div class="difficulty-backdrop" id="difficultyBackdrop" aria-hidden="true"><div class="difficulty-modal" role="dialog" aria-modal="true" aria-labelledby="difficultyTitle"><h2 class="difficulty-modal-title" id="difficultyTitle">Schwierigkeit</h2><div class="difficulty-options"><button class="difficulty-option" type="button" data-difficulty="easy"><strong>Leicht</strong><span>breites Fenster</span></button><button class="difficulty-option" type="button" data-difficulty="normal"><strong>Normal</strong><span>sauberer Takt</span></button><button class="difficulty-option" type="button" data-difficulty="hard"><strong>Schwer</strong><span>schneller, enger</span></button><button class="difficulty-option" type="button" data-difficulty="insane"><strong>Aua</strong><span>komplett frech</span></button></div></div></div>
<script>
const track=document.getElementById('track'),tapBtn=document.getElementById('tap'),scoreEl=document.getElementById('score'),streakEl=document.getElementById('streak'),roundEl=document.getElementById('round'),bestEl=document.getElementById('best'),logEl=document.getElementById('log'),resetBtn=document.getElementById('reset'),difficultyButton=document.getElementById('difficultyButton'),difficultyBackdrop=document.getElementById('difficultyBackdrop'),difficultyOptionButtons=document.querySelectorAll('[data-difficulty]'),debugPanel=document.getElementById('debugPanel'),debugAutoToggle=document.getElementById('debugAutoToggle'),debugSlowToggle=document.getElementById('debugSlowToggle'),debugPerfectBtn=document.getElementById('debugPerfect'),debugFinishBtn=document.getElementById('debugFinish');let beat=null,pos=0,speed=4.2,raf=null,score=0,streak=0,round=0,running=false,best=Number(localStorage.getItem('taktBest')||0),difficulty=localStorage.getItem('taktDifficulty')||'normal',debugMode=false,autoClick=false,slowMo=false,difficultyCloseTimer=null;const difficultyConfigs={easy:{label:'Chill',base:2.7,growth:.08,perfect:30,good:62,rounds:24,score:46},normal:{label:'Normal',base:3.45,growth:.16,perfect:18,good:42,rounds:30,score:60},hard:{label:'Hart',base:4.25,growth:.22,perfect:14,good:32,rounds:34,score:76},insane:{label:'Aua',base:5.15,growth:.3,perfect:10,good:24,rounds:40,score:96}};bestEl.textContent=best;[scoreEl,streakEl,roundEl,bestEl].forEach(el=>el.classList.add('stat-number'));
function updateDifficultyUi(){const config=getConfig();difficultyButton.firstChild.nodeValue=config.label;difficultyOptionButtons.forEach(button=>button.classList.toggle('active',button.dataset.difficulty===difficulty))}function openDifficultyMenu(){window.clearTimeout(difficultyCloseTimer);updateDifficultyUi();difficultyBackdrop.classList.remove('show','closing');void difficultyBackdrop.offsetWidth;difficultyBackdrop.classList.add('show');difficultyBackdrop.setAttribute('aria-hidden','false')}function closeDifficultyMenu(){if(!difficultyBackdrop.classList.contains('show')&&!difficultyBackdrop.classList.contains('closing'))return;window.clearTimeout(difficultyCloseTimer);difficultyBackdrop.classList.remove('show');difficultyBackdrop.classList.add('closing');difficultyBackdrop.setAttribute('aria-hidden','true');difficultyCloseTimer=window.setTimeout(()=>{difficultyBackdrop.classList.remove('closing')},280)}function setDifficulty(value){difficulty=value;localStorage.setItem('taktDifficulty',difficulty);updateDifficultyUi();if(running){cancelAnimationFrame(raf);if(beat)beat.remove();makeBeat();raf=requestAnimationFrame(loop)}render();setLog('Schwierigkeit: '+getConfig().label);closeDifficultyMenu()}function saveState(){localStorage.setItem('taktState',JSON.stringify({score,streak,round,best,log:logEl.textContent}))}
function renderStat(el,value){const nextText=String(value);if(el.dataset.value===nextText)return;el.dataset.value=nextText;el.textContent=nextText;el.classList.remove('stat-value-change');void el.offsetWidth;el.classList.add('stat-value-change');window.setTimeout(()=>el.classList.remove('stat-value-change'),620)}function getConfig(){return difficultyConfigs[difficulty]||difficultyConfigs.normal}function render(){const config=getConfig();renderStat(scoreEl,score);renderStat(streakEl,streak);renderStat(roundEl,round+'/'+config.rounds);renderStat(bestEl,best)}
function update(){render();saveState()}let logAnimationTimeouts=[];function setLog(text){if(logEl.textContent===text)return;if(window.matchMedia('(prefers-reduced-motion: reduce)').matches){logEl.textContent=text;return}logAnimationTimeouts.forEach(timeoutId=>window.clearTimeout(timeoutId));logAnimationTimeouts=[];logEl.classList.remove('reality-text-enter');logEl.classList.add('reality-text-exit');const updateTimeout=window.setTimeout(()=>{logEl.textContent=text;logEl.classList.remove('reality-text-exit');void logEl.offsetWidth;logEl.classList.add('reality-text-enter');const cleanupTimeout=window.setTimeout(()=>{logEl.classList.remove('reality-text-enter');logAnimationTimeouts=logAnimationTimeouts.filter(timeoutId=>timeoutId!==cleanupTimeout)},460);logAnimationTimeouts.push(cleanupTimeout)},165);logAnimationTimeouts.push(updateTimeout)}
function loadState(){const raw=localStorage.getItem('taktState');if(!raw){render();return}try{const state=JSON.parse(raw);score=state.score||0;streak=state.streak||0;round=state.round||0;best=state.best||best;logEl.textContent=state.log||logEl.textContent;render()}catch(error){render()}}
function makeBeat(){const config=getConfig();beat=document.createElement('div');beat.className='beat';track.append(beat);pos=-70;speed=(config.base+Math.min(4.8,round*config.growth))*(slowMo?0.45:1)}
function loop(){if(!running)return;pos+=speed;beat.style.left=pos+'px';if(autoClick&&Math.abs((pos+28)-track.clientWidth/2)<Math.max(5,getConfig().perfect*.45)){tap();return}if(pos>track.clientWidth+70){miss('Vorbei');next()}else raf=requestAnimationFrame(loop)}
function next(){cancelAnimationFrame(raf);if(beat)beat.remove();round++;update();if(round>=getConfig().rounds){finish();return}makeBeat();raf=requestAnimationFrame(loop)}
function start(){cancelAnimationFrame(raf);score=0;streak=0;round=0;running=true;track.querySelectorAll('.beat').forEach(b=>b.remove());update();makeBeat();raf=requestAnimationFrame(loop);setLog('Los.')}
function finish(){running=false;celebrate(track.clientWidth/2,62,true);if(score>best){best=score;localStorage.setItem('taktBest',best);setLog('Neuer Highscore: '+best)}else setLog('Fertig. Score '+score);popUi();update()}
function miss(text){streak=0;track.classList.add('miss');setLog(text);setTimeout(()=>track.classList.remove('miss'),180)}
function popUi(){scoreEl.parentElement.classList.add('bump');streakEl.parentElement.classList.add('bump');logEl.classList.add('pop');tapBtn.classList.add('kick');setTimeout(()=>{scoreEl.parentElement.classList.remove('bump');streakEl.parentElement.classList.remove('bump');logEl.classList.remove('pop');tapBtn.classList.remove('kick')},260)}
function celebrate(x,y,huge=false){const ring=document.createElement('span');ring.className='ring';ring.style.left=x-28+'px';ring.style.top=y-28+'px';track.append(ring);setTimeout(()=>ring.remove(),560);for(let i=0;i<(huge?42:18);i++){const p=document.createElement('span');p.className='burst';const angle=Math.random()*Math.PI*2,dist=(huge?90:55)*(.45+Math.random());p.style.left=x+'px';p.style.top=y+'px';p.style.setProperty('--x',Math.cos(angle)*dist+'px');p.style.setProperty('--y',Math.sin(angle)*dist+'px');p.style.background=i%3===0?'#38bdf8':i%3===1?'#fbc531':'#26de81';track.append(p);setTimeout(()=>p.remove(),680)}}
function tap(){if(!running||!beat)return;const config=getConfig(),center=pos+28,target=track.clientWidth/2,dist=Math.abs(center-target),x=center,y=62;if(dist<config.perfect){streak++;score+=config.score+streak*8;setLog('Perfekt');track.classList.add('perfect');celebrate(x,y,true)}else if(dist<config.good){streak++;score+=Math.round(config.score*.47)+streak*4;setLog('Gut');track.classList.add('hit');celebrate(x,y,false)}else{miss('Daneben');next();return}popUi();setTimeout(()=>track.classList.remove('hit','perfect'),220);next()}
function doReset(){localStorage.removeItem('taktBest');localStorage.removeItem('taktState');score=0;streak=0;round=0;best=0;setLog('Cache gelöscht.');update()}function spawnResetExplosion(){const rect=resetBtn.getBoundingClientRect(),cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;const shock=document.createElement('span');shock.className='reset-shockwave';shock.style.setProperty('--x',cx+'px');shock.style.setProperty('--y',cy+'px');document.body.append(shock);setTimeout(()=>shock.remove(),760);for(let i=0;i<64;i++){const p=document.createElement('span');p.className='reset-pop';const angle=Math.random()*Math.PI*2,dist=80+Math.random()*190;p.style.setProperty('--x',cx+'px');p.style.setProperty('--y',cy+'px');p.style.setProperty('--dx',Math.cos(angle)*dist+'px');p.style.setProperty('--dy',Math.sin(angle)*dist+'px');p.style.setProperty('--c',i%4===0?'#fbc531':i%4===1?'#38bdf8':i%4===2?'#26de81':'#fb7185');document.body.append(p);setTimeout(()=>p.remove(),840)}}let resetHoldRaf=null,resetHoldStart=0,resetHasFired=false,resetEggFired=false;function stopResetHold(){cancelAnimationFrame(resetHoldRaf);resetHoldRaf=null;resetHoldStart=0;resetBtn.classList.remove('holding','reset-ready','easter-growing');resetBtn.style.setProperty('--hold-progress',0);resetBtn.style.setProperty('--egg-scale',1);resetBtn.querySelector('.reset-label').textContent='Reset halten'}function tickResetHold(now){const elapsed=now-resetHoldStart,normalProgress=Math.min(elapsed/5000,1),eggProgress=Math.max(0,(elapsed-5000)/13500);resetBtn.style.setProperty('--hold-progress',normalProgress);resetBtn.style.setProperty('--egg-scale',1+Math.min(eggProgress,1)*2.9);if(!resetHasFired&&elapsed>=5000){resetHasFired=true;resetBtn.classList.add('reset-ready');doReset()}if(elapsed>=5000){resetBtn.classList.add('easter-growing');resetBtn.querySelector('.reset-label').textContent='weiter halten '+Math.max(0,Math.ceil((18500-elapsed)/1000))+'s'}else resetBtn.querySelector('.reset-label').textContent='Reset '+Math.ceil(normalProgress*100)+'%';if(!resetEggFired&&elapsed>=18500){resetEggFired=true;resetBtn.classList.add('exploding');spawnResetExplosion();setLog('Reset ist verdampft.');setTimeout(()=>{resetBtn.classList.remove('exploding');stopResetHold()},720);return}resetHoldRaf=requestAnimationFrame(tickResetHold)}function startResetHold(event){event.preventDefault();if(resetHoldRaf)return;resetHoldStart=performance.now();resetHasFired=false;resetEggFired=false;resetBtn.setPointerCapture?.(event.pointerId);resetBtn.classList.add('holding');tickResetHold(resetHoldStart)}function toggleDebug(force){debugMode=typeof force==='boolean'?force:!debugMode;debugPanel.classList.toggle('show',debugMode);debugPanel.setAttribute('aria-hidden',String(!debugMode));setLog(debugMode?'Debug an.':'Debug aus.')}function setAutoClick(value){autoClick=value;debugAutoToggle.checked=autoClick;setLog(autoClick?'Auto klickt.':'Auto aus.')}function setSlowMo(value){slowMo=value;debugSlowToggle.checked=slowMo;setLog(slowMo?'Slow an.':'Slow aus.')}difficultyButton.addEventListener('click',openDifficultyMenu);difficultyBackdrop.addEventListener('click',event=>{if(event.target===difficultyBackdrop)closeDifficultyMenu()});difficultyOptionButtons.forEach(button=>button.addEventListener('click',()=>setDifficulty(button.dataset.difficulty)));debugAutoToggle.addEventListener('change',()=>setAutoClick(debugAutoToggle.checked));debugSlowToggle.addEventListener('change',()=>setSlowMo(debugSlowToggle.checked));debugPerfectBtn.addEventListener('click',()=>{if(running&&beat){pos=track.clientWidth/2-28;beat.style.left=pos+'px';tap()}else setLog('Debug: erst starten.')});debugFinishBtn.addEventListener('click',()=>{round=getConfig().rounds-1;score+=333;update();finish()});document.getElementById('start').addEventListener('click',start);tapBtn.addEventListener('click',tap);document.addEventListener('keydown',e=>{if(e.shiftKey&&e.key.toLowerCase()==='d'){e.preventDefault();toggleDebug();return}if(e.key==='Escape'&&difficultyBackdrop.classList.contains('show')){e.preventDefault();closeDifficultyMenu();return}if(e.key===' '||e.key==='Enter'){e.preventDefault();tap()}});resetBtn.addEventListener('pointerdown',startResetHold);resetBtn.addEventListener('pointerup',stopResetHold);resetBtn.addEventListener('pointerleave',stopResetHold);resetBtn.addEventListener('pointercancel',stopResetHold);resetBtn.addEventListener('click',event=>event.preventDefault());document.addEventListener('contextmenu',event=>{if(event.target.closest('button, a, [role="button"]'))event.preventDefault()});updateDifficultyUi();loadState();
document.addEventListener('click',event=>{const target=event.target.closest('button,a,[role="button"]');if(!target)return;target.classList.remove('dopamine-hit');void target.offsetWidth;target.classList.add('dopamine-hit');const ring=document.createElement('span');ring.className='dopamine-burst';ring.style.left=event.clientX+'px';ring.style.top=event.clientY+'px';document.body.append(ring);setTimeout(()=>ring.remove(),620);for(let i=0;i<12;i++){const spark=document.createElement('span');spark.className='dopamine-spark';spark.style.left=event.clientX+'px';spark.style.top=event.clientY+'px';spark.style.background=i%3===0?'#38bdf8':i%3===1?'#fbc531':'#26de81';const angle=Math.random()*Math.PI*2,dist=32+Math.random()*42;spark.style.setProperty('--x',Math.cos(angle)*dist+'px');spark.style.setProperty('--y',Math.sin(angle)*dist+'px');document.body.append(spark);setTimeout(()=>spark.remove(),650)}});
</script><script id="bb-touch-zoom-guard">
(function() {
    if (window.__bbTouchZoomGuard) return;
    window.__bbTouchZoomGuard = true;

    let lastTouchEnd = 0;

    document.addEventListener('touchend', function(event) {
        const now = Date.now();

        if (now - lastTouchEnd <= 350 && event.cancelable) {
            event.preventDefault();
        }

        lastTouchEnd = now;
    }, { passive: false });

    document.addEventListener('dblclick', function(event) {
        if (event.cancelable) {
            event.preventDefault();
        }
    }, { passive: false });

    ['gesturestart', 'gesturechange', 'gestureend'].forEach(function(eventName) {
        document.addEventListener(eventName, function(event) {
            if (event.cancelable) {
                event.preventDefault();
            }
        }, { passive: false });
    });
})();
</script>
