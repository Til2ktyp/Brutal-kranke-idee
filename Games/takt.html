<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"><title>Takt</title>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5795114678692881" crossorigin="anonymous"></script>
<style>
:root{--bg-1:#0f172a;--bg-2:#312e81;--bg-3:#7c3aed;--border:rgba(255,255,255,.18);--text:#fff;--muted:rgba(255,255,255,.72);--accent:#fbc531;--accent-2:#38bdf8;--good:#26de81;--danger:#ef4444;--dark:#1e272e}*{box-sizing:border-box}button,a,[role="button"]{-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation}body{min-height:100vh;margin:0;padding:92px 18px 48px;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;color:var(--text);background:radial-gradient(circle at 12% 18%,rgba(56,189,248,.34),transparent 28%),radial-gradient(circle at 88% 14%,rgba(251,197,49,.25),transparent 24%),radial-gradient(circle at 50% 100%,rgba(168,85,247,.33),transparent 33%),linear-gradient(135deg,var(--bg-1),var(--bg-2) 52%,var(--bg-3));overflow-x:hidden}body:before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.13;background-image:linear-gradient(rgba(255,255,255,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.08) 1px,transparent 1px);background-size:46px 46px;mask-image:radial-gradient(circle at center,#000,transparent 78%)}.back-home-btn{position:fixed;top:20px;left:20px;z-index:2;background:var(--accent);color:var(--dark);padding:12px 18px;border-radius:12px;font-weight:900;text-decoration:none;box-shadow:0 8px 20px rgba(0,0,0,.25)}
.shell{position:relative;z-index:1;width:min(900px,100%);margin:0 auto}.hero{text-align:center;margin-bottom:20px}.eyebrow{display:inline-flex;margin-bottom:10px;padding:7px 12px;border-radius:999px;background:rgba(251,197,49,.16);color:#fde68a;border:1px solid rgba(251,197,49,.22);font-size:.8rem;font-weight:950;text-transform:uppercase}h1{margin:0;color:var(--accent);font-size:clamp(2.4rem,8vw,5rem);line-height:.95;font-weight:950}.subtitle{max-width:680px;margin:12px auto 0;color:var(--muted);line-height:1.55}.box{padding:24px;border:1px solid var(--border);border-radius:24px;background:linear-gradient(145deg,rgba(255,255,255,.16),rgba(255,255,255,.07));box-shadow:0 24px 70px rgba(0,0,0,.28);backdrop-filter:blur(18px)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}.stat{padding:14px;border-radius:14px;border:1px solid var(--border);background:rgba(255,255,255,.08);transition:transform .16s ease,border-color .16s ease,box-shadow .16s ease}.stat strong{display:block;color:var(--muted);font-size:.74rem;text-transform:uppercase}.stat span{display:block;margin-top:5px;font-size:1.45rem;font-weight:950}.stat.bump{transform:translateY(-2px) scale(1.04);border-color:rgba(251,197,49,.5);box-shadow:0 15px 34px rgba(251,197,49,.18)}.track{position:relative;height:124px;border-radius:20px;border:1px solid var(--border);background:radial-gradient(circle at 50% 50%,rgba(56,189,248,.12),transparent 42%),rgba(5,10,20,.48);overflow:hidden}.track:before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);transform:translateX(-100%);animation:scan 2.8s linear infinite;pointer-events:none}.zone{position:absolute;left:50%;top:0;bottom:0;width:74px;transform:translateX(-50%);background:linear-gradient(180deg,rgba(38,222,129,.1),rgba(251,197,49,.2));border-left:2px solid rgba(251,197,49,.8);border-right:2px solid rgba(251,197,49,.8);box-shadow:0 0 34px rgba(251,197,49,.18)}.beat{position:absolute;top:34px;width:56px;height:56px;border-radius:18px;background:linear-gradient(135deg,var(--accent-2),var(--accent));box-shadow:0 16px 40px rgba(0,0,0,.3),0 0 24px rgba(56,189,248,.32)}.burst{position:absolute;width:10px;height:10px;border-radius:999px;background:var(--accent);pointer-events:none;animation:burst .62s ease forwards}.ring{position:absolute;width:56px;height:56px;border:2px solid rgba(251,197,49,.9);border-radius:999px;pointer-events:none;animation:ring .52s ease-out forwards}.hit{animation:hit .3s ease}.perfect{animation:perfect .42s ease}.miss{animation:miss .22s ease}button{min-height:50px;border:0;border-radius:13px;padding:12px 16px;background:linear-gradient(135deg,var(--accent-2),#2563eb);color:#07111f;cursor:pointer;font:inherit;font-weight:950;box-shadow:0 10px 24px rgba(37,99,235,.26);transition:transform .16s ease,filter .16s ease}button:hover{transform:translateY(-2px);filter:brightness(1.06)}.tap{width:100%;margin-top:16px;font-size:1.2rem}.tap.kick{animation:kick .34s ease}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}.secondary{background:rgba(255,255,255,.12);color:var(--text);border:1px solid var(--border);box-shadow:none}.log{min-height:30px;margin-top:14px;color:var(--muted);font-weight:850;text-align:center;transition:transform .16s ease,color .16s ease}.log.pop{color:#fde68a;transform:scale(1.06)}@keyframes scan{to{transform:translateX(100%)}}@keyframes hit{50%{filter:brightness(1.9);transform:scale(1.015);box-shadow:0 0 42px rgba(38,222,129,.25)}}@keyframes perfect{35%{filter:brightness(2.4) saturate(1.6);transform:scale(1.035);box-shadow:0 0 64px rgba(251,197,49,.38)}}@keyframes miss{50%{filter:hue-rotate(120deg) brightness(1.2)}}@keyframes burst{to{transform:translate(var(--x),var(--y)) scale(.25);opacity:0}}@keyframes ring{to{transform:scale(2.5);opacity:0}}@keyframes kick{45%{transform:scale(1.03);box-shadow:0 18px 38px rgba(251,197,49,.22)}}@media(max-width:700px){body{padding-top:86px}.stats{grid-template-columns:repeat(2,1fr)}}
</style><style>.dopamine-burst{position:fixed;z-index:9999;left:0;top:0;width:14px;height:14px;border:2px solid rgba(251,197,49,.95);border-radius:999px;pointer-events:none;transform:translate(-50%,-50%);animation:dopamineRing .55s ease-out forwards}.dopamine-spark{position:fixed;z-index:9999;left:0;top:0;width:7px;height:7px;border-radius:999px;background:#fbc531;pointer-events:none;transform:translate(-50%,-50%);animation:dopamineSpark .58s ease-out forwards}.dopamine-hit{animation:dopamineHit .22s ease}@keyframes dopamineRing{to{width:110px;height:110px;opacity:0}}@keyframes dopamineSpark{to{transform:translate(calc(-50% + var(--x)),calc(-50% + var(--y))) scale(.2);opacity:0}}@keyframes dopamineHit{50%{filter:brightness(1.35) saturate(1.4);transform:scale(1.035)}}</style><style id="bb-touch-zoom-guard-style">
    html,
    body {
        touch-action: manipulation;
        -ms-touch-action: manipulation;
        -webkit-text-size-adjust: 100%;
    }
</style>
</head>
<body><a class="back-home-btn" href="https://blopperbold.org">← BlopperBold</a><main class="shell"><section class="hero"><div class="eyebrow">Timing-Spiel</div><h1>Takt</h1><p class="subtitle">Triff den Beat in der goldenen Zone. Space, Enter oder der große Button. Perfekt fühlt gefährlich gut.</p></section><section class="box"><div class="stats"><div class="stat"><strong>Score</strong><span id="score">0</span></div><div class="stat"><strong>Serie</strong><span id="streak">0</span></div><div class="stat"><strong>Runde</strong><span id="round">0/30</span></div><div class="stat"><strong>Best</strong><span id="best">0</span></div></div><div class="track" id="track"><div class="zone"></div></div><button class="tap" id="tap">Takt treffen</button><div class="row"><button id="start">Start</button><button class="secondary" id="reset">Reset</button></div><div class="log" id="log">Start drücken, dann im Fenster treffen.</div></section></main>
<script>
const track=document.getElementById('track'),tapBtn=document.getElementById('tap'),scoreEl=document.getElementById('score'),streakEl=document.getElementById('streak'),roundEl=document.getElementById('round'),bestEl=document.getElementById('best'),logEl=document.getElementById('log');let beat=null,pos=0,speed=4.2,raf=null,score=0,streak=0,round=0,running=false,best=Number(localStorage.getItem('taktBest')||0);bestEl.textContent=best;
function saveState(){localStorage.setItem('taktState',JSON.stringify({score,streak,round,best,log:logEl.textContent}))}
function render(){scoreEl.textContent=score;streakEl.textContent=streak;roundEl.textContent=round+'/30';bestEl.textContent=best}
function update(){render();saveState()}
function loadState(){const raw=localStorage.getItem('taktState');if(!raw){render();return}try{const state=JSON.parse(raw);score=state.score||0;streak=state.streak||0;round=state.round||0;best=state.best||best;logEl.textContent=state.log||logEl.textContent;render()}catch(error){render()}}
function makeBeat(){beat=document.createElement('div');beat.className='beat';track.append(beat);pos=-70;speed=3.45+Math.min(4.25,round*.16)}
function loop(){if(!running)return;pos+=speed;beat.style.left=pos+'px';if(pos>track.clientWidth+70){miss('Vorbei');next()}else raf=requestAnimationFrame(loop)}
function next(){cancelAnimationFrame(raf);if(beat)beat.remove();round++;update();if(round>=30){finish();return}makeBeat();raf=requestAnimationFrame(loop)}
function start(){cancelAnimationFrame(raf);score=0;streak=0;round=0;running=true;track.querySelectorAll('.beat').forEach(b=>b.remove());update();makeBeat();raf=requestAnimationFrame(loop);logEl.textContent='Los.'}
function finish(){running=false;celebrate(track.clientWidth/2,62,true);if(score>best){best=score;localStorage.setItem('taktBest',best);logEl.textContent='Neuer Highscore: '+best}else logEl.textContent='Fertig. Score '+score;popUi();update()}
function miss(text){streak=0;track.classList.add('miss');logEl.textContent=text;setTimeout(()=>track.classList.remove('miss'),180)}
function popUi(){scoreEl.parentElement.classList.add('bump');streakEl.parentElement.classList.add('bump');logEl.classList.add('pop');tapBtn.classList.add('kick');setTimeout(()=>{scoreEl.parentElement.classList.remove('bump');streakEl.parentElement.classList.remove('bump');logEl.classList.remove('pop');tapBtn.classList.remove('kick')},260)}
function celebrate(x,y,huge=false){const ring=document.createElement('span');ring.className='ring';ring.style.left=x-28+'px';ring.style.top=y-28+'px';track.append(ring);setTimeout(()=>ring.remove(),560);for(let i=0;i<(huge?42:18);i++){const p=document.createElement('span');p.className='burst';const angle=Math.random()*Math.PI*2,dist=(huge?90:55)*(.45+Math.random());p.style.left=x+'px';p.style.top=y+'px';p.style.setProperty('--x',Math.cos(angle)*dist+'px');p.style.setProperty('--y',Math.sin(angle)*dist+'px');p.style.background=i%3===0?'#38bdf8':i%3===1?'#fbc531':'#26de81';track.append(p);setTimeout(()=>p.remove(),680)}}
function tap(){if(!running||!beat)return;const center=pos+28,target=track.clientWidth/2,dist=Math.abs(center-target),x=center,y=62;if(dist<18){streak++;score+=60+streak*8;logEl.textContent='Perfekt';track.classList.add('perfect');celebrate(x,y,true)}else if(dist<42){streak++;score+=28+streak*4;logEl.textContent='Gut';track.classList.add('hit');celebrate(x,y,false)}else{miss('Daneben');next();return}popUi();setTimeout(()=>track.classList.remove('hit','perfect'),220);next()}
document.getElementById('start').addEventListener('click',start);tapBtn.addEventListener('click',tap);document.addEventListener('keydown',e=>{if(e.key===' '||e.key==='Enter'){e.preventDefault();tap()}});document.getElementById('reset').addEventListener('click',()=>{localStorage.removeItem('taktBest');localStorage.removeItem('taktState');score=0;streak=0;round=0;best=0;logEl.textContent='Cache gelöscht.';update()});document.addEventListener('contextmenu',event=>{if(event.target.closest('button, a, [role="button"]'))event.preventDefault()});loadState();
document.addEventListener('click',event=>{const target=event.target.closest('button,a,[role="button"]');if(!target)return;target.classList.remove('dopamine-hit');void target.offsetWidth;target.classList.add('dopamine-hit');const ring=document.createElement('span');ring.className='dopamine-burst';ring.style.left=event.clientX+'px';ring.style.top=event.clientY+'px';document.body.append(ring);setTimeout(()=>ring.remove(),620);for(let i=0;i<12;i++){const spark=document.createElement('span');spark.className='dopamine-spark';spark.style.left=event.clientX+'px';spark.style.top=event.clientY+'px';spark.style.background=i%3===0?'#38bdf8':i%3===1?'#fbc531':'#26de81';const angle=Math.random()*Math.PI*2,dist=32+Math.random()*42;spark.style.setProperty('--x',Math.cos(angle)*dist+'px');spark.style.setProperty('--y',Math.sin(angle)*dist+'px');document.body.append(spark);setTimeout(()=>spark.remove(),650)}});
</script><script id="bb-touch-zoom-guard">
(function() {
    if (window.__bbTouchZoomGuard) return;
    window.__bbTouchZoomGuard = true;

    let lastTouchEnd = 0;

    document.addEventListener('touchend', function(event) {
        const now = Date.now();

        if (now - lastTouchEnd <= 350 && event.cancelable) {
            event.preventDefault();
        }

        lastTouchEnd = now;
    }, { passive: false });

    document.addEventListener('dblclick', function(event) {
        if (event.cancelable) {
            event.preventDefault();
        }
    }, { passive: false });

    ['gesturestart', 'gesturechange', 'gestureend'].forEach(function(eventName) {
        document.addEventListener(eventName, function(event) {
            if (event.cancelable) {
                event.preventDefault();
            }
        }, { passive: false });
    });
})();
</script>
</body></html>
