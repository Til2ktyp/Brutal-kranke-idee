<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100 Prozent Risiko</title>
    <style>
        :root {
            --ink: #17212f;
            --muted: #657184;
            --paper: rgba(255, 255, 255, 0.9);
            --paper-strong: #ffffff;
            --line: rgba(23, 33, 47, 0.12);
            --accent: #f7b731;
            --accent-2: #20bf6b;
            --danger: #eb3b5a;
            --blue: #2d98da;
            --shadow: 0 24px 70px rgba(23, 33, 47, 0.22);
            --bg-1: #0f172a;
            --bg-2: #312e81;
            --bg-3: #7c3aed;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 88px 18px 34px;
            color: var(--ink);
            background:
                radial-gradient(circle at 12% 18%, rgba(56, 189, 248, 0.34), transparent 28%),
                radial-gradient(circle at 88% 14%, rgba(251, 197, 49, 0.25), transparent 24%),
                radial-gradient(circle at 50% 100%, rgba(168, 85, 247, 0.33), transparent 33%),
                linear-gradient(135deg, var(--bg-1), var(--bg-2) 52%, var(--bg-3));
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            opacity: 0.13;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.08) 1px, transparent 1px);
            background-size: 46px 46px;
            mask-image: radial-gradient(circle at center, black, transparent 78%);
        }

        .back-home-btn {
            position: fixed;
            top: 18px;
            left: 18px;
            z-index: 1001;
            background: var(--paper-strong);
            color: var(--ink);
            padding: 11px 15px;
            border: 1px solid var(--line);
            border-radius: 999px;
            font-weight: 800;
            text-decoration: none;
            box-shadow: 0 12px 28px rgba(23, 33, 47, 0.14);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
        }

        .back-home-btn:hover {
            background: #fff8e1;
            color: var(--ink);
            transform: translateX(-2px);
            box-shadow: 0 16px 34px rgba(23, 33, 47, 0.18);
        }

        .container {
            position: relative;
            z-index: 1;
            width: min(680px, 100%);
            text-align: center;
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0.78));
            padding: clamp(24px, 6vw, 44px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 24px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .container::before {
            content: "100";
            position: absolute;
            top: -56px;
            right: -8px;
            z-index: -1;
            color: rgba(45, 152, 218, 0.08);
            font-size: clamp(7rem, 22vw, 13rem);
            font-weight: 950;
            line-height: 1;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            padding: 7px 12px;
            border-radius: 999px;
            background: rgba(247, 183, 49, 0.16);
            color: #9a6500;
            font-size: 0.82rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0;
        }

        h1 {
            margin: 0;
            font-size: clamp(2.25rem, 8vw, 4.8rem);
            line-height: 0.94;
            font-weight: 950;
        }

        .subtitle {
            max-width: 520px;
            margin: 16px auto 0;
            color: var(--muted);
            font-size: clamp(1rem, 2.4vw, 1.12rem);
            line-height: 1.55;
        }

        .game-panel {
            margin-top: 30px;
            padding: clamp(16px, 4vw, 24px);
            border: 1px solid var(--line);
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.68);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72);
        }

        .progress-bar-container {
            width: 100%;
            height: clamp(46px, 9vw, 58px);
            background:
                linear-gradient(180deg, rgba(23, 33, 47, 0.08), rgba(23, 33, 47, 0.03)),
                #e8edf4;
            border-radius: 999px;
            overflow: hidden;
            margin-top: 0;
            border: 1px solid rgba(23, 33, 47, 0.1);
            cursor: pointer;
            box-shadow: inset 0 3px 10px rgba(23, 33, 47, 0.12);
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.12s ease, box-shadow 0.12s ease;
        }

        .progress-bar-container:hover {
            transform: translateY(-1px);
            box-shadow: inset 0 3px 10px rgba(23, 33, 47, 0.12), 0 12px 24px rgba(45, 152, 218, 0.16);
        }

        .progress-bar-container:focus-visible {
            outline: 4px solid rgba(45, 152, 218, 0.32);
            outline-offset: 5px;
        }

        .progress-bar-container:active {
            transform: scale(0.99);
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background:
                linear-gradient(90deg, var(--accent-2), #26de81 58%, var(--accent));
            border-radius: inherit;
            box-shadow: 0 0 28px rgba(32, 191, 107, 0.36);
            transition: width 0.14s ease-in-out;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            margin-top: 18px;
        }

        .status-card {
            min-width: 0;
            padding: 14px;
            border: 1px solid var(--line);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.7);
        }

        .status-label {
            margin: 0 0 5px;
            color: var(--muted);
            font-size: 0.78rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0;
        }

        #clickCount,
        #resetChance {
            margin: 0;
            font-size: clamp(1.25rem, 4vw, 1.7rem);
            color: var(--ink);
            font-weight: 950;
        }

        .records-container {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            margin-top: 12px;
        }

        .records-container p {
            margin: 0;
            padding: 14px;
            border: 1px solid var(--line);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.55);
            font-size: 0.95rem;
            color: var(--muted);
        }

        .records-container span {
            display: block;
            margin-top: 4px;
            font-size: 1.35rem;
            font-weight: 950;
            color: var(--blue);
        }

        #message {
            min-height: 32px;
            margin: 20px 0 0;
            font-size: clamp(1rem, 3vw, 1.22rem);
            color: var(--blue);
            font-weight: 900;
        }

        .reset-message {
            color: var(--danger);
        }

        .win-message {
            color: var(--accent-2);
        }

        @media (max-width: 560px) {
            body {
                align-items: flex-start;
            }

            .back-home-btn {
                max-width: calc(100% - 36px);
            }

            .status-grid,
            .records-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <a class="back-home-btn" href="https://blopperbold.org" aria-label="Zurück zu BlopperBold">← BlopperBold</a>

    <main class="container">
        <div class="eyebrow">Risiko steigt mit jedem Klick</div>
        <h1>100 Prozent</h1>
        <p class="subtitle">Bring den Balken auf 100. Jeder Klick macht Fortschritt, aber die Reset-Chance zieht gnadenlos mit.</p>

        <section class="game-panel" aria-label="Klick-Spiel">
            <div class="progress-bar-container" id="progressBarContainer" role="button" tabindex="0" aria-label="Balken klicken">
                <div class="progress-bar" id="progressBar"></div>
            </div>

            <div class="status-grid">
                <div class="status-card">
                    <p class="status-label">Fortschritt</p>
                    <p id="clickCount">0 / 100</p>
                </div>
                <div class="status-card">
                    <p class="status-label">Reset-Chance</p>
                    <p id="resetChance">0%</p>
                </div>
            </div>

            <div class="records-container">
                <p>Niedrigster Reset<span id="minResetRecord">N/A</span></p>
                <p>Höchster Reset<span id="maxResetRecord">N/A</span></p>
            </div>

            <p id="message" aria-live="polite"></p>
        </section>
    </main>

    <script>
        const progressBar = document.getElementById('progressBar');
        const progressBarContainer = document.getElementById('progressBarContainer');
        const clickCountDisplay = document.getElementById('clickCount');
        const resetChanceDisplay = document.getElementById('resetChance');
        const minResetRecordDisplay = document.getElementById('minResetRecord');
        const maxResetRecordDisplay = document.getElementById('maxResetRecord');
        const messageDisplay = document.getElementById('message');

        let clicks = 0;
        const totalClicks = 100;
        const resetChanceIncrement = 1; // Chance steigt um 1% pro Klick

        // Rekorde im Local Storage speichern, damit sie auch nach dem Neuladen der Seite erhalten bleiben
        let minResetRecord = localStorage.getItem('minResetRecord') ? parseInt(localStorage.getItem('minResetRecord')) : Infinity; // Infinity für den Anfang
        let maxResetRecord = localStorage.getItem('maxResetRecord') ? parseInt(localStorage.getItem('maxResetRecord')) : 0;

        // Funktion zum Aktualisieren der Rekordanzeigen
        function updateRecordDisplays() {
            minResetRecordDisplay.textContent = minResetRecord === Infinity ? 'N/A' : minResetRecord;
            maxResetRecordDisplay.textContent = maxResetRecord === 0 ? 'N/A' : maxResetRecord;
        }

        // Rekorde beim Start der Seite laden und anzeigen
        updateRecordDisplays();

        function playRound() {
            // Nur klicken, wenn das Spiel noch läuft (nicht schon 100 Klicks erreicht)
            if (clicks < totalClicks) {
                const currentClicksBeforeAttempt = clicks; // Klicks vor dem aktuellen Versuch speichern
                
                // Überprüfen, ob ein Reset stattfindet
                const currentResetChance = clicks * resetChanceIncrement; // Chance ist Klickzahl * 1%
                const randomNumber = Math.random() * 100; // Zufallszahl zwischen 0 und 100

                if (randomNumber < currentResetChance && clicks > 0) { // Reset nur, wenn die Klickzahl > 0 ist, damit ein Reset bei 0 Klicks nicht zählt
                    // Reset!
                    messageDisplay.textContent = `Oh nein! Der Balken wurde bei ${currentClicksBeforeAttempt} Klicks zurückgesetzt!`;
                    messageDisplay.classList.add('reset-message');
                    messageDisplay.classList.remove('win-message');

                    // Rekorde aktualisieren
                    if (currentClicksBeforeAttempt < minResetRecord) {
                        minResetRecord = currentClicksBeforeAttempt;
                        localStorage.setItem('minResetRecord', minResetRecord);
                    }
                    if (currentClicksBeforeAttempt > maxResetRecord) {
                        maxResetRecord = currentClicksBeforeAttempt;
                        localStorage.setItem('maxResetRecord', maxResetRecord);
                    }
                    updateRecordDisplays(); // Rekordanzeigen aktualisieren

                    clicks = 0;
                    progressBar.style.width = '0%';
                    
                    setTimeout(() => {
                        messageDisplay.classList.remove('reset-message');
                        messageDisplay.textContent = ''; // Nachricht zurücksetzen
                    }, 2500); // Nachricht für 2.5 Sekunden anzeigen, um die Reset-Info zu sehen

                } else {
                    // Kein Reset, Fortschritt machen
                    clicks++;
                    const percentage = (clicks / totalClicks) * 100;
                    progressBar.style.width = percentage + '%';
                    messageDisplay.textContent = ''; // Alte Nachricht löschen
                    messageDisplay.classList.remove('reset-message', 'win-message');
                }

                // Immer die Klickzahl und Reset-Chance aktualisieren
                clickCountDisplay.textContent = `${clicks} / ${totalClicks}`;
                resetChanceDisplay.textContent = `${clicks * resetChanceIncrement}%`;
                progressBarContainer.setAttribute('aria-label', `Balken klicken. ${clicks} von ${totalClicks} Klicks erreicht.`);

                if (clicks === totalClicks) {
                    messageDisplay.textContent = 'Geschafft! Du hast den Balken 100 Mal geklickt!';
                    messageDisplay.classList.remove('reset-message');
                    messageDisplay.classList.add('win-message');
                    // Wenn man 100 Klicks erreicht, gibt es keinen Reset, daher keine Rekordaktualisierung hier.
                }
            }
        }

        progressBarContainer.addEventListener('click', playRound);

        progressBarContainer.addEventListener('keydown', (event) => {
            if (event.key === 'Enter' || event.key === ' ') {
                event.preventDefault();
                playRound();
            }
        });
    </script>
</body>
</html>
