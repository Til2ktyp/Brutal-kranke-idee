<!DOCTYPE html>
<html lang="de">
<head>
    <meta name="google-adsense-account" content="ca-pub-5795114678692881">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5795114678692881"
        crossorigin="anonymous" data-bb-adsense="true"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0d0618">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0d0618">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="robots" content="noindex, nofollow">
    <title>Runaway Soundboard</title>
    <style>
        :root {
            --red: #e5a93b;
            --purple: #2dd4bf;
            --violet: #2dd4bf;
            --cyan: #2dd4bf;
            --gold: #e5a93b;
            --text: #ffffff;
            --muted: rgba(204, 251, 241, 0.65);
            --panel: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.14);
            --bg-1: #0b0f19;
            --bg-2: #072a3a;
            --bg-3: #043e4f;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            min-height: 100%;
            margin: 0;
            background: var(--bg-1);
            touch-action: manipulation;
            overscroll-behavior-x: none;
            -webkit-text-size-adjust: 100%;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            color: var(--text);
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            background:
                radial-gradient(circle at 12% 18%, rgba(45, 212, 191, 0.3), transparent 28%),
                radial-gradient(circle at 88% 14%, rgba(229, 169, 59, 0.22), transparent 24%),
                radial-gradient(circle at 50% 100%, rgba(14, 165, 233, 0.25), transparent 33%),
                linear-gradient(135deg, var(--bg-1), var(--bg-2) 48%, var(--bg-3));
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -1;
            background:
                radial-gradient(circle at 12% 18%, rgba(45, 212, 191, 0.3), transparent 28%),
                radial-gradient(circle at 88% 14%, rgba(229, 169, 59, 0.22), transparent 24%),
                radial-gradient(circle at 50% 100%, rgba(14, 165, 233, 0.25), transparent 33%),
                linear-gradient(135deg, var(--bg-1), var(--bg-2) 48%, var(--bg-3));
            pointer-events: none;
        }

        button,
        a,
        input {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            font: inherit;
        }

        .back-home {
            position: fixed;
            left: max(14px, env(safe-area-inset-left));
            top: max(14px, env(safe-area-inset-top));
            z-index: 10;
            min-height: 40px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 0 14px;
            border: 1px solid var(--border);
            border-radius: 999px;
            color: white;
            text-decoration: none;
            font-weight: 900;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(18px);
        }

        .settings {
            position: fixed;
            right: max(14px, env(safe-area-inset-right));
            top: max(14px, env(safe-area-inset-top));
            z-index: 10;
            display: flex;
            gap: 8px;
        }

        .chip {
            min-height: 40px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 0 12px;
            border: 1px solid var(--border);
            border-radius: 999px;
            color: white;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(18px);
            font-weight: 900;
        }

        .chip input {
            width: 18px;
            height: 18px;
            accent-color: var(--red);
        }

        .shell {
            width: min(920px, calc(100% - 24px));
            margin: 0 auto;
            padding: 72px 0 34px;
        }

        .hero {
            text-align: center;
            margin-bottom: 14px;
        }

        .kicker {
            display: inline-flex;
            min-height: 30px;
            align-items: center;
            padding: 0 12px;
            border: 1px solid rgba(229, 169, 59, 0.42);
            border-radius: 999px;
            color: #fde68a;
            background: rgba(229, 169, 59, 0.1);
            font-size: 0.75rem;
            font-weight: 950;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        h1 {
            margin: 10px 0 7px;
            color: var(--red);
            font-size: clamp(2.45rem, 8vw, 5.2rem);
            line-height: 0.9;
            font-weight: 950;
            letter-spacing: 0;
            text-shadow: 0 0 26px rgba(229, 169, 59, 0.26);
            transform: rotate(-1deg);
        }

        .subtitle {
            max-width: 690px;
            margin: 0 auto;
            color: var(--muted);
            font-weight: 750;
            line-height: 1.45;
        }

        .status {
            margin: 12px auto 0;
            color: rgba(255, 255, 255, 0.58);
            font-size: 0.84rem;
            font-weight: 850;
        }

        .tutorial-button {
            min-height: 42px;
            display: block;
            margin: 12px auto 0;
            padding: 0 16px;
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 999px;
            color: white;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(18px);
            font-weight: 950;
            cursor: pointer;
        }

        .tutorial-backdrop {
            position: fixed;
            inset: 0;
            z-index: 30;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 22px;
            background: rgba(3, 2, 7, 0.48);
            backdrop-filter: blur(16px);
            opacity: 0;
        }

        .tutorial-backdrop.show {
            display: flex;
            animation: tutorialBackdropIn 0.22s ease forwards;
        }

        .tutorial-backdrop.closing {
            display: flex;
            animation: tutorialBackdropOut 0.18s ease forwards;
        }

        .soundboard-modal-card {
            width: min(520px, 100%);
            padding: 20px;
            border: 1px solid var(--border);
            border-radius: 24px;
            color: white;
            background:
                radial-gradient(circle at 20% 0%, rgba(229, 169, 59, 0.18), transparent 35%),
                linear-gradient(145deg, rgba(7, 42, 58, 0.96), rgba(11, 15, 25, 0.94));
            box-shadow: 0 30px 90px rgba(0, 0, 0, 0.45);
            opacity: 0;
            transform: scale(0.9) translateY(10px);
        }

        .tutorial-backdrop.show .soundboard-modal-card {
            animation: tutorialCardIn 0.28s cubic-bezier(0.18, 0.9, 0.24, 1) forwards;
        }

        .tutorial-backdrop.closing .soundboard-modal-card {
            animation: tutorialCardOut 0.18s ease forwards;
        }

        .soundboard-modal-card h2 {
            margin: 0 0 10px;
            color: var(--red);
            font-size: 1.6rem;
            line-height: 1;
        }

        .soundboard-modal-card p {
            margin: 0 0 14px;
            color: var(--muted);
            font-weight: 800;
            line-height: 1.4;
        }

        .tutorial-sequence {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            margin-bottom: 16px;
        }

        .tutorial-sequence span {
            min-width: 38px;
            min-height: 34px;
            display: inline-grid;
            place-items: center;
            padding: 0 10px;
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            font-weight: 950;
        }

        .tutorial-close {
            width: 100%;
            min-height: 44px;
            border: 0;
            border-radius: 14px;
            color: white;
            background: linear-gradient(135deg, var(--red), var(--purple));
            font-weight: 950;
            cursor: pointer;
        }

        @keyframes tutorialBackdropIn {
            to {
                opacity: 1;
            }
        }

        @keyframes tutorialBackdropOut {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
            }
        }

        @keyframes tutorialCardIn {
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        @keyframes tutorialCardOut {
            from {
                opacity: 1;
                transform: scale(1) translateY(0);
            }

            to {
                opacity: 0;
                transform: scale(0.92) translateY(8px);
            }
        }

        .board {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 8px;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 22px;
            background:
                radial-gradient(circle at 18% 0%, rgba(45, 212, 191, 0.22), transparent 35%),
                radial-gradient(circle at 84% 8%, rgba(229, 169, 59, 0.16), transparent 30%),
                rgba(255, 255, 255, 0.07);
            box-shadow: 0 28px 80px rgba(0, 0, 0, 0.38);
            backdrop-filter: blur(22px);
        }

        .pad {
            min-height: clamp(98px, 12vw, 136px);
            display: grid;
            grid-template-rows: 1fr auto;
            align-items: center;
            overflow: hidden;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 8px;
            color: white;
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.13), rgba(255, 255, 255, 0.06));
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12);
            cursor: pointer;
            transition: transform 0.06s ease, border-color 0.08s ease, background 0.08s ease;
        }

        .pad.special {
            background: linear-gradient(145deg, rgba(45, 212, 191, 0.24), rgba(255, 255, 255, 0.07));
        }

        .pad.long {
            border-color: rgba(229, 169, 59, 0.32);
            background: linear-gradient(145deg, rgba(229, 169, 59, 0.18), rgba(45, 212, 191, 0.1));
        }

        .pad.hit {
            transform: translateY(2px) scale(0.985);
            border-color: rgba(45, 212, 191, 0.85);
            background: linear-gradient(145deg, rgba(45, 212, 191, 0.24), rgba(229, 169, 59, 0.12));
        }

        .pad.toggle-on {
            border-color: rgba(229, 169, 59, 0.8);
            background: linear-gradient(145deg, rgba(229, 169, 59, 0.24), rgba(45, 212, 191, 0.14));
            box-shadow: 0 0 28px rgba(229, 169, 59, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.14);
        }

        .key {
            display: block;
            align-self: end;
            font-size: clamp(2.75rem, 7vw, 5.2rem);
            font-weight: 300;
            line-height: 0.85;
            text-transform: uppercase;
        }

        .label {
            min-height: 22px;
            display: block;
            color: rgba(255, 255, 255, 0.88);
            font-size: clamp(0.72rem, 1.3vw, 0.9rem);
            font-weight: 950;
            line-height: 1.1;
        }

        .spark {
            position: fixed;
            left: var(--x);
            top: var(--y);
            z-index: 20;
            width: 7px;
            height: 7px;
            border-radius: 999px;
            background: var(--c);
            box-shadow: 0 0 16px var(--c);
            pointer-events: none;
            animation: spark 0.52s ease-out forwards;
        }

        @keyframes spark {
            to {
                transform: translate(var(--dx), var(--dy)) scale(0.1);
                opacity: 0;
            }
        }

        @media (max-width: 760px) {
            .shell {
                width: min(100% - 16px, 520px);
                min-height: 100vh;
                min-height: 100dvh;
                display: flex;
                flex-direction: column;
                justify-content: flex-start;
                padding-top: max(48px, env(safe-area-inset-top));
                padding-bottom: max(74px, calc(env(safe-area-inset-bottom) + 58px));
            }

            .settings {
                top: auto;
                right: 8px;
                bottom: max(8px, env(safe-area-inset-bottom));
                transform: scale(0.9);
                transform-origin: right bottom;
            }

            .back-home {
                min-height: 36px;
                padding: 0 11px;
                font-size: 0.82rem;
            }

            .hero {
                margin-bottom: 12px;
            }

            h1 {
                margin: 8px 0 4px;
                font-size: clamp(2rem, 12vw, 3.6rem);
            }

            .subtitle {
                display: none;
            }

            .status {
                margin-top: 7px;
                font-size: 0.76rem;
            }

            .tutorial-button {
                min-height: 38px;
                margin-top: 9px;
                font-size: 0.82rem;
            }

            .board {
                width: 100%;
                margin: 0 auto;
                gap: 7px;
                padding: 8px;
                border-radius: 18px;
            }

            .pad {
                min-height: clamp(78px, 19vw, 96px);
                padding: 8px 5px;
            }

            .key {
                font-size: clamp(1.9rem, 10vw, 3.2rem);
            }

            .label {
                min-height: 18px;
                font-size: 0.62rem;
            }
        }
    </style>
    <link rel="stylesheet" href="../tutorial.css">
</head>
<body>
    <a class="back-home" href="../index.html">← BlopperBold</a>
    <div class="settings" aria-label="Soundboard Einstellungen">
        <label class="chip" style="display: inline-flex; align-items: center; gap: 8px;">Vol: <input id="volumeSlider" type="range" min="0" max="1" step="0.05" style="width: 80px; vertical-align: middle; height: auto; cursor: pointer;"></label>
        <label class="chip">Spam <input id="spamToggle" type="checkbox"></label>
        <label class="chip">ADHS <input id="adhdToggle" type="checkbox"></label>
    </div>

    <main class="shell">
        <section class="hero" aria-labelledby="title">
            <span class="kicker">Ye Soundboard</span>
            <h1 id="title">Runaway</h1>
            <p class="subtitle">Tasten hauen, Samples sofort feuern.</p>
            <p class="status" id="status">Samples laden...</p>
            <div style="display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;">
                <button class="tutorial-button" id="tutorialButton" type="button" style="margin-top: 12px;">Runaway Tutorial</button>
                <button class="tutorial-button" id="recordBtn" type="button" style="margin-top: 12px; background: rgba(229, 169, 59, 0.1); border-color: rgba(229, 169, 59, 0.4); color: #fde68a;">⏺ Aufnehmen</button>
                <button class="tutorial-button" id="playBtn" type="button" style="margin-top: 12px; display: none;">▶ Abspielen</button>
                <button class="tutorial-button" id="playPresetBtn" type="button" style="margin-top: 12px; background: rgba(45, 212, 191, 0.1); border-color: rgba(45, 212, 191, 0.4); color: #cbfbf4;">✨ Preset abspielen</button>
                <button class="tutorial-button" id="stopPlayBtn" type="button" style="margin-top: 12px; display: none; background: rgba(229, 169, 59, 0.1); border-color: rgba(229, 169, 59, 0.4); color: #fde68a;"> Stoppen</button>
                <button class="tutorial-button" id="downloadBtn" type="button" style="margin-top: 12px; display: none; background: rgba(45, 212, 191, 0.1); border-color: rgba(45, 212, 191, 0.4); color: #cbfbf4;">📥 Download</button>
                <button class="tutorial-button" id="importBtn" type="button" style="margin-top: 12px; background: rgba(45, 212, 191, 0.1); border-color: rgba(45, 212, 191, 0.4); color: #cbfbf4;">📤 Importieren</button>
                <a class="tutorial-button" href="sampler.html" style="margin-top: 12px; display: inline-flex; align-items: center; justify-content: center; text-decoration: none; background: rgba(45, 212, 191, 0.1); border-color: rgba(45, 212, 191, 0.4); color: #cbfbf4;">🎛️ Eigener Sampler</a>
                <input type="file" id="importFile" accept=".json" style="display: none;">
            </div>
        </section>

        <section class="board" id="board" aria-label="Runaway Soundboard Pads">
            <button class="pad" type="button" data-key="a" data-sound="piano1"><span class="key">A</span><span class="label">piano 1</span></button>
            <button class="pad" type="button" data-key="s" data-sound="piano2"><span class="key">S</span><span class="label">piano 2</span></button>
            <button class="pad" type="button" data-key="d" data-sound="piano3"><span class="key">D</span><span class="label">piano 3</span></button>
            <button class="pad" type="button" data-key="f" data-sound="piano4"><span class="key">F</span><span class="label">piano 4</span></button>
            <button class="pad" type="button" data-key="g" data-sound="piano5"><span class="key">G</span><span class="label">piano 5</span></button>
            <button class="pad" type="button" data-key="h" data-sound="piano6"><span class="key">H</span><span class="label">piano 6</span></button>
            <button class="pad" type="button" data-key="j" data-sound="piano7"><span class="key">J</span><span class="label">piano 7</span></button>
            <button class="pad" type="button" data-key="k" data-sound="piano8"><span class="key">K</span><span class="label">piano 8</span></button>
            <button class="pad long" type="button" data-key="y" data-sound="fullbeat"><span class="key">Y</span><span class="label">Full Beat</span></button>
            <button class="pad special" type="button" data-key="x" data-sound="ladies"><span class="key">X</span><span class="label">Ladies</span></button>
            <button class="pad special" type="button" data-key="c" data-sound="lookatcha"><span class="key">C</span><span class="label">Lookatcha</span></button>
            <button class="pad" type="button" data-key="b" data-sound="beautiful"><span class="key">B</span><span class="label">Beautiful</span></button>
            <button class="pad" type="button" data-key="v" data-sound="justbeat"><span class="key">V</span><span class="label">Just Beat</span></button>
            <button class="pad" type="button" data-key="m" data-action="stop"><span class="key">M</span><span class="label">Stop</span></button>
            <button class="pad" type="button" data-key="i" data-action="info"><span class="key">I</span><span class="label">Info</span></button>
            <button class="pad special" type="button" data-key="r" data-action="lyrics"><span class="key">R</span><span class="label">Kanye Lyrics</span></button>
        </section>
    </main>

    <div class="tutorial-backdrop" id="tutorialBackdrop" aria-hidden="true">
        <section class="soundboard-modal-card" role="dialog" aria-modal="true" aria-labelledby="tutorialTitle">
            <h2 id="tutorialTitle">Runaway spielen</h2>
            <p>Erst die Piano-Folge, dann den Beat reinwerfen und Lookatcha komplett melken.</p>
            <div class="tutorial-sequence" aria-label="Runaway Tastenfolge">
                <span>A</span><span>A</span><span>A</span>
                <span>S</span>
                <span>D</span><span>D</span><span>D</span>
                <span>F</span>
                <span>G</span><span>G</span><span>G</span>
                <span>H</span>
                <span>J</span><span>J</span>
                <span>K</span>
                <span>A</span>
                <span>Y</span>
                <span>C spam</span>
            </div>
            <button class="tutorial-close" id="tutorialClose" type="button">Verstanden</button>
        </section>
    </div>

    <div class="tutorial-backdrop" id="infoBackdrop" aria-hidden="true">
        <section class="soundboard-modal-card" role="dialog" aria-modal="true" aria-labelledby="infoTitle">
            <h2 id="infoTitle">Info</h2>
            <p>Made by Til 2ktyp with &lt;3</p>
            <button class="tutorial-close" id="infoClose" type="button">Stark</button>
        </section>
    </div>

    <script>
        const SETTINGS_KEY = 'yeSoundboardSettings';
        const files = {
            piano1: 'Runaway/A.mp3',
            piano2: 'Runaway/B.mp3',
            piano3: 'Runaway/C.mp3',
            piano4: 'Runaway/D.mp3',
            piano5: 'Runaway/E.mp3',
            piano6: 'Runaway/F.mp3',
            piano7: 'Runaway/G.mp3',
            piano8: 'Runaway/H.mp3',
            fullbeat: 'Runaway/fullbeat.mp3',
            ladies: 'Runaway/ladiesandgentleman.mp3',
            lookatcha: 'Runaway/lookatcha.mp3',
            beautiful: 'Runaway/beautiful stars.mp3',
            justbeat: 'Runaway/justbeat.mp3',
            lyrics: 'Runaway/lyrics.mp3'
        };

        const smallSounds = Object.keys(files).filter(id => id !== 'fullbeat' && id !== 'lyrics');
        const pads = Array.from(document.querySelectorAll('.pad'));
        const padByKey = Object.fromEntries(pads.map(pad => [pad.dataset.key, pad]));
        const statusEl = document.getElementById('status');
        const spamToggle = document.getElementById('spamToggle');
        const adhdToggle = document.getElementById('adhdToggle');
        const tutorialButton = document.getElementById('tutorialButton');
        const tutorialBackdrop = document.getElementById('tutorialBackdrop');
        const tutorialClose = document.getElementById('tutorialClose');
        const infoBackdrop = document.getElementById('infoBackdrop');
        const infoClose = document.getElementById('infoClose');
        const buffers = {};
        const trimOffsets = {};
        const active = new Set();
        const fallbackActive = new Set();
        const fullBeat = new Audio(files.fullbeat);
        fullBeat.preload = 'metadata';
        const lyricsAudio = new Audio(files.lyrics);
        lyricsAudio.preload = 'metadata';
        let context;
        let masterGain = null;
        let justBeatSource = null;
        let justBeatAudio = null;
        let lastTouchEnd = 0;
        let lastVisual = 0;
        let unlockPromise = null;
        let lyricsEnabled = false;

        const volumeSlider = document.getElementById('volumeSlider');
        const recordBtn = document.getElementById('recordBtn');
        const playBtn = document.getElementById('playBtn');
        const playPresetBtn = document.getElementById('playPresetBtn');
        const stopPlayBtn = document.getElementById('stopPlayBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const importBtn = document.getElementById('importBtn');
        const importFile = document.getElementById('importFile');

        let isRecording = false;
        let isPlayingPlayback = false;
        let recordingStartTime = 0;
        let recordedEvents = [];
        let playbackTimeouts = [];

        let settings = readSettings();

        function readSettings() {
            try {
                return { spam: true, adhd: true, volume: 0.8, ...JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}') };
            } catch {
                return { spam: true, adhd: true, volume: 0.8 };
            }
        }

        function saveSettings() {
            localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
            spamToggle.checked = settings.spam;
            adhdToggle.checked = settings.adhd;
            volumeSlider.value = settings.volume;
            if (context && masterGain) {
                masterGain.gain.setValueAtTime(settings.volume, context.currentTime);
            }
            fullBeat.volume = settings.volume;
            lyricsAudio.volume = settings.volume;
            fallbackActive.forEach(audio => {
                audio.volume = settings.volume;
            });
            if (justBeatAudio) {
                justBeatAudio.volume = settings.volume;
            }
        }

        function audioContext() {
            if (!context) {
                const Ctx = window.AudioContext || window.webkitAudioContext;
                if (Ctx) {
                    context = new Ctx({ latencyHint: 'interactive' });
                    masterGain = context.createGain();
                    masterGain.gain.setValueAtTime(settings.volume !== undefined ? settings.volume : 0.8, context.currentTime);
                    masterGain.connect(context.destination);
                }
            }
            return context;
        }

        function unlockAudio() {
            const ctx = audioContext();
            if (!ctx || ctx.state === 'running') return Promise.resolve(true);
            if (!unlockPromise) {
                unlockPromise = ctx.resume().then(() => {
                    const silent = ctx.createBuffer(1, 1, 22050);
                    const source = ctx.createBufferSource();
                    source.buffer = silent;
                    if (masterGain) {
                        source.connect(masterGain);
                    } else {
                        source.connect(ctx.destination);
                    }
                    source.start(0);
                    return true;
                }).catch(() => false).finally(() => {
                    unlockPromise = null;
                });
            }
            return unlockPromise;
        }

        function loadArrayBuffer(src) {
            return new Promise((resolve, reject) => {
                const request = new XMLHttpRequest();
                request.open('GET', encodeURI(src), true);
                request.responseType = 'arraybuffer';
                request.onload = () => request.status === 0 || request.status < 400 ? resolve(request.response) : reject();
                request.onerror = reject;
                request.send();
            });
        }

        function decodeAudio(ctx, data) {
            return new Promise((resolve, reject) => {
                const copy = data.slice(0);
                const result = ctx.decodeAudioData(copy, resolve, reject);
                if (result?.then) result.then(resolve).catch(reject);
            });
        }

        function findTrimOffset(buffer) {
            const threshold = 0.006;
            const maxScan = Math.min(buffer.length, Math.floor(buffer.sampleRate * 0.18));
            for (let i = 0; i < maxScan; i += 1) {
                for (let channel = 0; channel < buffer.numberOfChannels; channel += 1) {
                    if (Math.abs(buffer.getChannelData(channel)[i]) > threshold) {
                        return Math.max(0, i / buffer.sampleRate - 0.002);
                    }
                }
            }
            return 0;
        }

        async function loadSounds() {
            const ctx = audioContext();
            if (!ctx) {
                statusEl.textContent = 'Fallback bereit';
                return;
            }

            let done = 0;
            let failed = 0;
            statusEl.textContent = 'Samples laden...';
            const pianoSounds = smallSounds.filter(id => id.startsWith('piano'));
            const loadOrder = ['lookatcha', ...pianoSounds, 'justbeat', ...smallSounds.filter(id => id !== 'lookatcha' && id !== 'justbeat' && !id.startsWith('piano'))];
            for (const id of loadOrder) {
                try {
                    const data = await loadArrayBuffer(files[id]);
                    buffers[id] = await decodeAudio(ctx, data);
                    trimOffsets[id] = findTrimOffset(buffers[id]);
                    done += 1;
                    statusEl.textContent = `${done}/${smallSounds.length} bereit`;
                } catch {
                    failed += 1;
                }
            }
            statusEl.textContent = done ? `Samples bereit${failed ? ' + Fallback' : ''}` : 'Fallback bereit';
        }

        function playBuffer(id, loop = false) {
            const ctx = audioContext();
            const buffer = buffers[id];
            if (!ctx || ctx.state !== 'running' || !buffer) return false;

            if (!settings.spam && !loop) stopSound(id);
            const source = ctx.createBufferSource();
            source.buffer = buffer;
            source.loop = loop;
            if (loop && id === 'justbeat') {
                source.loopStart = 0.002;
                source.loopEnd = Math.max(source.loopStart + 0.05, buffer.duration - 0.018);
            }
            if (masterGain) {
                source.connect(masterGain);
            } else {
                source.connect(ctx.destination);
            }
            source._soundId = id;
            source.onended = () => active.delete(source);
            active.add(source);
            const startOffset = !loop ? trimOffsets[id] || 0 : 0;
            source.start(0, startOffset);
            return source;
        }

        function playFallback(id, loop = false) {
            const audio = new Audio(files[id]);
            audio.volume = settings.volume;
            audio.loop = loop;
            audio.preload = 'auto';
            audio._soundId = id;
            audio.addEventListener('ended', () => fallbackActive.delete(audio));
            fallbackActive.add(audio);
            audio.play().catch(() => fallbackActive.delete(audio));
            return audio;
        }

        function stopSound(id) {
            active.forEach(source => {
                if (source._soundId !== id) return;
                try {
                    source.stop();
                } catch {}
                active.delete(source);
            });
        }

        function stopFallback(id) {
            fallbackActive.forEach(audio => {
                if (audio._soundId !== id) return;
                audio.pause();
                audio.currentTime = 0;
                fallbackActive.delete(audio);
            });
        }

        function stopAll() {
            active.forEach(source => {
                try {
                    source.stop();
                } catch {}
            });
            active.clear();
            fallbackActive.forEach(audio => {
                audio.pause();
                audio.currentTime = 0;
            });
            fallbackActive.clear();
            if (justBeatSource) justBeatSource = null;
            if (justBeatAudio) {
                justBeatAudio.pause();
                justBeatAudio.currentTime = 0;
                justBeatAudio = null;
            }
            fullBeat.pause();
            fullBeat.currentTime = 0;
            lyricsAudio.pause();
            lyricsAudio.currentTime = 0;
            lyricsEnabled = false;
            padByKey.r?.classList.remove('toggle-on');
            statusEl.textContent = 'Gestoppt';
        }

        function playSound(id) {
            if (id === 'fullbeat') {
                fullBeat.volume = settings.volume;
                fullBeat.currentTime = 0;
                fullBeat.play().catch(() => {});
                return;
            }

            if (id === 'lyrics') {
                lyricsEnabled = !lyricsEnabled;
                padByKey.r?.classList.toggle('toggle-on', lyricsEnabled);
                if (lyricsEnabled) {
                    lyricsAudio.volume = settings.volume;
                    lyricsAudio.currentTime = 0;
                    lyricsAudio.play().catch(() => {});
                    statusEl.textContent = 'Kanye West Lyrics an';
                } else {
                    lyricsAudio.pause();
                    lyricsAudio.currentTime = 0;
                    statusEl.textContent = 'Kanye West Lyrics aus';
                }
                return;
            }

            if (id === 'lookatcha') {
                stopSound(id);
                stopFallback(id);
            }
            
            if (id === 'ladies') {
                stopSound(id);
                stopFallback(id);
            }
            
            if (id === 'justbeat') {
                if (justBeatSource) {
                    try {
                        justBeatSource.stop();
                    } catch {}
                    justBeatSource = null;
                    return;
                }
                if (justBeatAudio) {
                    justBeatAudio.pause();
                    justBeatAudio.currentTime = 0;
                    justBeatAudio = null;
                    return;
                }
                justBeatSource = playBuffer(id, true) || null;
                if (!justBeatSource) {
                    justBeatAudio = new Audio(files.justbeat);
                    justBeatAudio.volume = settings.volume;
                    justBeatAudio.loop = true;
                    justBeatAudio.play().catch(() => { justBeatAudio = null; });
                    if (!justBeatAudio) statusEl.textContent = 'Just Beat lädt noch kurz...';
                }
                return;
            }

            if (id.startsWith('piano') && !buffers[id]) {
                statusEl.textContent = 'Piano lädt noch kurz...';
                return;
            }

            if (!playBuffer(id)) playFallback(id);
        }

        function visual(pad, event) {
            const now = performance.now();
            if (!settings.adhd && now - lastVisual < 45) return;
            lastVisual = now;
            pad.classList.add('hit');
            setTimeout(() => pad.classList.remove('hit'), 70);

            if (!settings.adhd || !event) return;
            const colors = ['#ff243d', '#c084fc', '#38bdf8', '#fbc531'];
            for (let i = 0; i < 10; i += 1) {
                const spark = document.createElement('span');
                const angle = Math.random() * Math.PI * 2;
                const dist = 28 + Math.random() * 68;
                spark.className = 'spark';
                spark.style.setProperty('--x', event.clientX + 'px');
                spark.style.setProperty('--y', event.clientY + 'px');
                spark.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
                spark.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
                spark.style.setProperty('--c', colors[i % colors.length]);
                document.body.append(spark);
                setTimeout(() => spark.remove(), 540);
            }
        }

        function hitPad(pad, event, isPlayback = false) {
            if (isRecording && !isPlayback) {
                const key = pad.dataset.key;
                if (key) {
                    recordedEvents.push({
                        key: key,
                        time: performance.now() - recordingStartTime
                    });
                }
            }
            visual(pad, event);
            unlockAudio();
            if (pad.dataset.sound) playSound(pad.dataset.sound);
            if (pad.dataset.action === 'stop') {
                stopAll();
                if (isPlayingPlayback) stopPlayback();
            }
            if (pad.dataset.action === 'lyrics') playSound('lyrics');
            if (pad.dataset.action === 'info') openInfo();
        }

        boardEl.addEventListener('pointerdown', event => {
            const pad = event.target.closest('.pad');
            if (pad) {
                event.preventDefault();
                hitPad(pad, event);
            }
        }, { passive: false });

        document.addEventListener('keydown', event => {
            if (event.repeat && !settings.spam) return;
            const pad = padByKey[event.key.toLowerCase()];
            if (!pad || event.metaKey || event.ctrlKey || event.altKey) return;
            event.preventDefault();
            const rect = pad.getBoundingClientRect();
            hitPad(pad, { clientX: rect.left + rect.width / 2, clientY: rect.top + rect.height / 2 });
        });

            settings.spam = spamToggle.checked;

        function startPlayback(events = recordedEvents, isPreset = false) {
            if (events.length === 0) return;
            isPlayingPlayback = true;
            playBtn.style.display = 'none';
            downloadBtn.style.display = 'none';
            importBtn.style.display = 'none';
            playPresetBtn.style.display = 'none';
            stopPlayBtn.style.display = 'inline-block';
            recordBtn.style.display = 'none';
            statusEl.textContent = isPreset ? 'Spiele Preset ab...' : 'Spiele Aufnahme ab...';

            playbackTimeouts = [];
            let maxTime = 0;

            events.forEach(evt => {
                if (evt.time > maxTime) maxTime = evt.time;
                const timeoutId = setTimeout(() => {
                    const pad = padByKey[evt.key];
                    if (pad) {
                        const rect = pad.getBoundingClientRect();
                        hitPad(pad, { clientX: rect.left + rect.width / 2, clientY: rect.top + rect.height / 2 }, true);
                    }
                }, evt.time);
                playbackTimeouts.push(timeoutId);
            });

            const endTimeoutId = setTimeout(() => {
                stopPlayback();
            }, maxTime + 100);
            playbackTimeouts.push(endTimeoutId);
        }

        function stopPlayback() {
            isPlayingPlayback = false;
            playbackTimeouts.forEach(id => clearTimeout(id));
            playbackTimeouts = [];
            
            if (recordedEvents.length > 0) {
                playBtn.style.display = 'inline-block';
                downloadBtn.style.display = 'inline-block';
            } else {
                playBtn.style.display = 'none';
                downloadBtn.style.display = 'none';
            }
            
            importBtn.style.display = 'inline-block';
            playPresetBtn.style.display = 'inline-block';
            stopPlayBtn.style.display = 'none';
            recordBtn.style.display = 'inline-block';
            statusEl.textContent = 'Wiedergabe beendet.';
        }

        recordBtn.addEventListener('click', () => {
            if (isRecording) {
                stopRecording();
            } else {
                if (isPlayingPlayback) stopPlayback();
                startRecording();
            }
        });

        downloadBtn.addEventListener('click', () => {
            if (recordedEvents.length === 0) return;
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(recordedEvents, null, 2));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", "aufnahme.json");
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        });

        importBtn.addEventListener('click', () => {
            importFile.click();
        });

        importFile.addEventListener('change', event => {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = e => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (Array.isArray(data) && data.every(evt => evt.key !== undefined && evt.time !== undefined)) {
                        recordedEvents = data;
                        playBtn.style.display = 'inline-block';
                        downloadBtn.style.display = 'inline-block';
                        statusEl.textContent = `Aufnahme erfolgreich importiert: ${recordedEvents.length} Töne geladen.`;
                    } else {
                        statusEl.textContent = 'Fehler: Ungültiges Aufnahme-Format in der JSON-Datei.';
                    }
                } catch (err) {
                    statusEl.textContent = 'Fehler beim Lesen der JSON-Datei.';
                }
            };
            reader.readAsText(file);
            importFile.value = ''; // Reset file input
        });

        playBtn.addEventListener('click', () => {
            if (isPlayingPlayback) {
                stopPlayback();
            } else {
                startPlayback(recordedEvents, false);
            }
        });

        playPresetBtn.addEventListener('click', () => {
            if (isPlayingPlayback) {
                stopPlayback();
            } else {
                startPlayback(presetEvents, true);
            }
        });

        stopPlayBtn.addEventListener('click', () => {

        });

        let tutorialCloseTimer = 0;

        function closeTutorial() {
            if (!tutorialBackdrop.classList.contains('show')) return;
            clearTimeout(tutorialCloseTimer);
            tutorialBackdrop.classList.remove('show');
            tutorialBackdrop.classList.add('closing');
            tutorialBackdrop.setAttribute('aria-hidden', 'true');
            tutorialCloseTimer = setTimeout(() => {
                tutorialBackdrop.classList.remove('closing');
            }, 190);
        }

        tutorialButton.addEventListener('click', () => {
            clearTimeout(tutorialCloseTimer);
            tutorialBackdrop.classList.remove('closing');
            tutorialBackdrop.classList.add('show');
            tutorialBackdrop.setAttribute('aria-hidden', 'false');
        });

        tutorialClose.addEventListener('click', closeTutorial);
        tutorialBackdrop.addEventListener('click', event => {
            if (event.target === tutorialBackdrop) closeTutorial();
        });

        function openInfo() {
            infoBackdrop.classList.remove('closing');
            infoBackdrop.classList.add('show');
            infoBackdrop.setAttribute('aria-hidden', 'false');
        }

        function closeInfo() {
            if (!infoBackdrop.classList.contains('show')) return;
            infoBackdrop.classList.remove('show');
            infoBackdrop.classList.add('closing');
            infoBackdrop.setAttribute('aria-hidden', 'true');
            setTimeout(() => infoBackdrop.classList.remove('closing'), 190);
        }

        infoClose.addEventListener('click', closeInfo);
        infoBackdrop.addEventListener('click', event => {
            if (event.target === infoBackdrop) closeInfo();
        });

            if (event.target.closest('button, a')) event.preventDefault();
        });

            if (event.key === 'Escape') {
                closeTutorial();
                closeInfo();
            }
        });

        document.addEventListener('dblclick', event => event.preventDefault(), { passive: false });
        document.addEventListener('touchend', event => {
            const now = Date.now();
            if (now - lastTouchEnd < 350 && event.cancelable) event.preventDefault();
            lastTouchEnd = now;
        }, { passive: false });

        ['gesturestart', 'gesturechange', 'gestureend'].forEach(name => {
            document.addEventListener(name, event => {
                if (event.cancelable) event.preventDefault();
            }, { passive: false });
        });

        loadSounds().catch(() => {
            statusEl.textContent = 'Fallback bereit';
